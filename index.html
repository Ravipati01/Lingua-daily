<style id="kids-style">
/* body.kids = correct selector (class toggled on body element) */
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
body.kids{
background:linear-gradient(135deg,#FFF0FB 0%,#E8F4FD 40%,#FFF8E7 70%,#F0FFF4 100%) !important;
font-family:'Nunito',sans-serif !important;
min-height:100vh;
}
.kids-card{border-radius:28px !important;border-width:3px !important}
.kids-btn{border-radius:22px !important;font-size:18px !important;font-weight:900 !important;min-height:54px !important}
.kids-text{font-size:20px !important;font-weight:800 !important}
.kids-big{font-size:44px !important}
/* Bouncy animation for correct answers in kids mode */
@keyframes kidsBounce{0%{transform:scale(1)}30%{transform:scale(1.15)}60%{transform:scale(0.95)}100%{transform:scale(1)}}
@keyframes kidsShake{0%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}100%{transform:translateX(0)}}
.kids-correct{animation:kidsBounce 0.5s ease !important}
.kids-wrong{animation:kidsShake 0.5s ease !important}
/* Star sparkle */
@keyframes starPop{0%{transform:scale(0) rotate(0deg);opacity:0}60%{transform:scale(1.3) rotate(20deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}
.star-pop{animation:starPop 0.4s ease forwards}

/* ── Flashcard 3D flip animations ── */
@keyframes flipToBack{
0% {transform:perspective(800px) rotateY(0deg); opacity:1;}
49% {transform:perspective(800px) rotateY(-90deg); opacity:0;}
50% {transform:perspective(800px) rotateY(90deg); opacity:0;}
100%{transform:perspective(800px) rotateY(0deg); opacity:1;}
}
@keyframes flipToFront{
0% {transform:perspective(800px) rotateY(0deg); opacity:1;}
49% {transform:perspective(800px) rotateY(90deg); opacity:0;}
50% {transform:perspective(800px) rotateY(-90deg);opacity:0;}
100%{transform:perspective(800px) rotateY(0deg); opacity:1;}
}
.flash-flip-back {animation:flipToBack 0.82s cubic-bezier(0.34,1.2,0.64,1) forwards;}
.flash-flip-front{animation:flipToFront 0.82s cubic-bezier(0.34,1.2,0.64,1) forwards;}

["Friday","Viernes","BYER-nes","¡Por fin es viernes hoy!","El viernes salimos a bailar.","Los viernes trabajo desde casa.","Finally it is Friday today!","We go dancing on Friday.","I work from home on Fridays."],["Saturday","Sábado","SAH-bah-doh","El sábado voy de compras.","Los sábados descanso mucho.","Quedamos el sábado por la tarde.","I go shopping on Saturday.","I rest a lot on Saturdays.","We meet on Saturday afternoon."],["Sunday","Domingo","doh-MEEN-goh","El domingo es día de familia.","Los domingos vamos a la iglesia.","Descansa bien el domingo.","Sunday is family day.","We go to church on Sundays.","Rest well on Sunday."]],"body":[["Head","Cabeza","kah-BEH-sah","Me duele mucho la cabeza.","Llevo un sombrero en la cabeza.","Piensa con la cabeza siempre.","I have a bad headache.","I wear a hat on my head.","Always think with your head."],["Eye","Ojo","OH-hoh","Tengo los ojos muy marrones.","¡Cuídate los ojos siempre!","Abrí los ojos y vi el sol.","I have brown eyes.","Always take care of your eyes!","I opened my eyes and saw the sun."],["Ear","Oreja","oh-REH-hah","Me duele la oreja izquierda.","Tienes las orejas muy frías.","Pon el auricular en la oreja.","My left ear hurts.","Your ears are very cold.","Put the earphone in your ear."],["Nose","Nariz","nah-REES","Tengo la nariz muy tapada.","La nariz le sangra un poco.","¡Limpia tu nariz ahora!","My nose is very blocked.","Her nose is bleeding a little.","Clean your nose now!"],["Mouth","Boca","BOH-kah","Abre la boca, por favor.","¡Cállate la boca ya!","Tiene una boca muy grande.","Open your mouth, please.","Be quiet!","He has a very big mouth."],["Hand","Mano","MAH-noh","Dame la mano, por favor.","Lávate las manos antes de comer.","Tiene las manos muy frías.","Give me your hand, please.","Wash your hands before eating.","Her hands are very cold."],["Foot","Pie","pyeh","Me duele mucho el pie derecho.","Ponte los zapatos en el pie.","Camina descalzo por la playa.","My right foot hurts a lot.","Put your shoes on your foot.","Walk barefoot on the beach."],["Stomach","Estómago","es-TOH-mah-goh","Me duele mucho el estómago.","Tengo el estómago muy vacío.","El estómago me gruñe de hambre.","My stomach hurts a lot.","My stomach is very empty.","My stomach is growling with hunger."],["Back","Espalda","es-PAL-dah","Me duele mucho la espalda.","Siéntate derecho para la espalda.","El médico revisó mi espalda.","My back hurts a lot.","Sit straight for your back.","The doctor checked my back."],["Leg","Pierna","PYER-nah","Me duele mucho la pierna.","Rompió la pierna en el partido.","Tienes las piernas muy cansadas.","My leg hurts a lot.","She broke her leg in the match.","Your legs are very tired."]],"weather":[["Sunny","Soleado","so-leh-AH-doh","Hoy hace mucho sol brillante.","Un día soleado es perfecto.","El sol sale a las 6.","It is very sunny today.","A sunny day is perfect.","The sun rises at 6."],["Rain","Lluvia","YOO-byah","Está lloviendo mucho hoy.","La lluvia me encanta mucho.","Lleva paraguas, hay lluvia.","It is raining a lot today.","I love the rain so much.","Bring an umbrella, it is raining."],["Cloud","Nube","NOO-beh","Hay muchas nubes hoy.","Una nube grande tapó el sol.","Las nubes son muy oscuras.","There are many clouds today.","A big cloud covered the sun.","The clouds are very dark."],["Wind","Viento","BYEN-toh","Hace mucho viento hoy.","El viento es muy frío hoy.","El viento sopla muy fuerte.","It is very windy today.","The wind is very cold today.","The wind is blowing very hard."],["Cold","Frío","FREE-oh","¡Qué frío hace hoy!","El agua está muy fría.","Me muero de frío aquí.","It is so cold today!","The water is very cold.","I am freezing here."],["Hot","Calor","kah-LOR","¡Qué calor hace hoy!","El verano es muy caluroso aquí.","Me muero de calor ahora.","It is so hot today!","Summer is very hot here.","I am dying of heat now."],["Snow","Nieve","NYEH-beh","Está nevando mucho hoy.","La nieve es muy blanca.","Los niños juegan con la nieve.","It is snowing a lot today.","The snow is very white.","Children play in the snow."],["Storm","Tormenta","tor-MEN-tah","Viene una gran tormenta.","La tormenta duró toda la noche.","¡Cuidado con la tormenta!","A big storm is coming.","The storm lasted all night.","Be careful of the storm!"]],"numbers2":[["Eleven","Once","ON-seh","Tengo once años.","Son las once.","Hay once jugadores.","I am eleven.","It is eleven.","There are eleven players."],["Twelve","Doce","DOH-seh","Hay doce meses en un año.","Son las doce.","Tengo doce lápices.","There are twelve months.","It is twelve.","I have twelve pencils."],["Twenty","Veinte","BAYN-teh","Tengo veinte años.","Compré veinte manzanas.","Hay veinte sillas.","I am twenty.","I bought twenty apples.","There are twenty chairs."],["Thirty","Treinta","TRAYN-tah","Septiembre tiene treinta días.","Treinta personas vinieron.","Tengo treinta libros.","September has thirty days.","Thirty people came.","I have thirty books."],["Forty","Cuarenta","kwah-REN-tah","Mi padre tiene cuarenta años.","Cuarenta alumnos en el examen.","El viaje tardó cuarenta minutos.","My father is forty.","Forty students in the exam.","The journey took forty minutes."],["Fifty","Cincuenta","seen-KWEN-tah","Mi madre tiene cincuenta años.","El libro cuesta cincuenta rupias.","Hay cincuenta preguntas.","My mother is fifty.","The book costs fifty rupees.","There are fifty questions."],["Sixty","Sesenta","seh-SEN-tah","Mi abuelo tiene sesenta años.","Un minuto tiene sesenta segundos.","Sesenta personas en la boda.","My grandfather is sixty.","A minute has sixty seconds.","Sixty people at the wedding."],["Seventy","Setenta","seh-TEN-tah","El anciano tiene setenta años.","El setenta por ciento es agua.","Setenta estudiantes pasaron.","The old man is seventy.","Seventy percent is water.","Seventy students passed."],["Eighty","Ochenta","oh-CHEN-tah","Mi bisabuela tiene ochenta años.","Ochenta estudiantes pasaron.","La velocidad es ochenta km/h.","My great-grandmother is eighty.","Eighty students passed.","The speed is eighty km/h."],["Hundred","Cien","syen","Hay cien centavos en un peso.","Corrí cien metros.","Cien personas en la boda.","There are a hundred cents.","I ran a hundred metres.","A hundred people at the wedding."]],"months":[["January","Enero","eh-NEH-roh","Enero es el primer mes.","Hace frío en enero.","Mi cumpleaños es en enero.","January is the first month.","It is cold in January.","My birthday is in January."],["February","Febrero","feh-BREH-roh","Febrero es el mes más corto.","San Valentín es en febrero.","Febrero tiene veintiocho días.","February is the shortest month.","Valentine's Day is in February.","February has twenty-eight days."],["March","Marzo","MAR-soh","Marzo es el tercer mes.","La primavera empieza en marzo.","Mi examen es en marzo.","March is the third month.","Spring starts in March.","My exam is in March."],["April","Abril","ah-BREEL","Abril es el cuarto mes.","Llueve mucho en abril.","Mi cumpleaños es en abril.","April is the fourth month.","It rains a lot in April.","My birthday is in April."],["May","Mayo","MAH-yoh","Mayo es el quinto mes.","Las flores florecen en mayo.","Nos graduamos en mayo.","May is the fifth month.","Flowers bloom in May.","We graduate in May."],["June","Junio","HOO-nyoh","Junio es el sexto mes.","Las vacaciones empiezan en junio.","Mi boda es en junio.","June is the sixth month.","Holidays start in June.","My wedding is in June."],["July","Julio","HOO-lyoh","Julio es el séptimo mes.","Hace mucho calor en julio.","El cuatro de julio es feriado.","July is the seventh month.","It is very hot in July.","The fourth of July is a holiday."],["August","Agosto","ah-GOS-toh","Agosto es el octavo mes.","El quince de agosto es festivo.","Hace calor en agosto.","August is the eighth month.","August fifteenth is a holiday.","It is hot in August."],["September","Septiembre","sep-TYEM-breh","Septiembre tiene treinta días.","El otoño empieza en septiembre.","Regreso a clase en septiembre.","September has thirty days.","Autumn starts in September.","I go back to class in September."],["October","Octubre","ok-TOO-broh","Octubre tiene treinta y un días.","Diwali es en octubre.","Las hojas caen en octubre.","October has thirty-one days.","Diwali is in October.","Leaves fall in October."],["November","Noviembre","noh-BYEM-breh","Noviembre tiene treinta días.","Hace frío en noviembre.","Mi cumpleaños es en noviembre.","November has thirty days.","It is cold in November.","My birthday is in November."],["December","Diciembre","dee-SYEM-breh","Diciembre es el último mes.","La Navidad es en diciembre.","Hace mucho frío en diciembre.","December is the last month.","Christmas is in December.","It is very cold in December."]],"animals":[["Dog","Perro","PEH-roh","El perro ladra fuerte.","Mi perro se llama Max.","El perro es nuestro amigo.","The dog barks loudly.","My dog is named Max.","The dog is our friend."],["Cat","Gato","GAH-toh","El gato duerme todo el día.","Mi gato bebe leche.","El gato subió al árbol.","The cat sleeps all day.","My cat drinks milk.","The cat climbed the tree."],["Elephant","Elefante","eh-leh-FAN-teh","El elefante es el animal más grande.","Tiene una trompa larga.","Vi un elefante en el zoológico.","The elephant is the largest animal.","It has a long trunk.","I saw an elephant at the zoo."],["Tiger","Tigre","TEE-greh","El tigre es un animal feroz.","Es el animal nacional de India.","Vi un tigre en la selva.","The tiger is a fierce animal.","It is India's national animal.","I saw a tiger in the jungle."],["Bird","Pájaro","PAH-ha-roh","El pájaro canta en el árbol.","Vi un pájaro colorido.","El pájaro vuela alto.","The bird sings in the tree.","I saw a colourful bird.","The bird flies high."],["Fish","Pez","pes","El pez nada en el río.","Vi peces de colores.","El pez es bueno para la salud.","The fish swims in the river.","I saw colourful fish.","Fish is good for health."],["Cow","Vaca","BAH-kah","La vaca da leche fresca.","La vaca pasta en el campo.","La vaca es sagrada en India.","The cow gives fresh milk.","The cow grazes in the field.","The cow is sacred in India."],["Monkey","Mono","MOH-noh","El mono salta de árbol en árbol.","El mono come un plátano.","Los monos viven en la selva.","The monkey jumps tree to tree.","The monkey eats a banana.","Monkeys live in the jungle."],["Lion","León","leh-ON","El león es el rey de la selva.","El león ruge con fuerza.","Vi un león en el safari.","The lion is king of the jungle.","The lion roars loudly.","I saw a lion on safari."],["Rabbit","Conejo","koh-NEH-hoh","El conejo come zanahorias.","Tiene orejas largas.","El conejo salta rápido.","The rabbit eats carrots.","It has long ears.","The rabbit jumps fast."],["Butterfly","Mariposa","mah-ree-POH-sah","La mariposa vuela de flor en flor.","Tiene alas coloridas.","Vi una mariposa en el jardín.","The butterfly flies flower to flower.","It has colourful wings.","I saw a butterfly in the garden."],["Horse","Caballo","kah-BAH-yoh","El caballo corre muy rápido.","Come hierba en el campo.","El jinete montó el caballo.","The horse runs very fast.","It eats grass in the field.","The rider rode the horse."]],"clothing":[["Shirt","Camisa","kah-MEE-sah","Me puse una camisa azul.","La camisa está sucia.","Compré una camisa nueva.","I put on a blue shirt.","The shirt is dirty.","I bought a new shirt."],["Pants","Pantalones","pan-tah-LOH-nes","Me puse pantalones negros.","Son demasiado largos.","Te quedan bien esos pantalones.","I put on black pants.","They are too long.","Those pants suit you well."],["Dress","Vestido","bes-TEE-doh","Ella lleva un vestido rojo.","El vestido es muy bonito.","Compramos un vestido para la boda.","She wears a red dress.","The dress is very beautiful.","We bought a dress for the wedding."],["Shoes","Zapatos","sah-PAH-tohs","Me puse los zapatos negros.","Mis zapatos están sucios.","Compré zapatos para la escuela.","I put on black shoes.","My shoes are dirty.","I bought shoes for school."],["Hat","Sombrero","som-BREH-roh","Me puse el sombrero al salir.","Protege del sol.","Perdí mi sombrero favorito.","I put on a hat going out.","It protects from the sun.","I lost my favourite hat."],["Jacket","Chaqueta","chah-KEH-tah","Ponte la chaqueta, hace frío.","La chaqueta azul es mía.","Compramos chaquetas para el invierno.","Wear a jacket, it is cold.","The blue jacket is mine.","We bought jackets for winter."],["Socks","Calcetines","kal-seh-TEE-nes","Olvidé ponerme los calcetines.","Están mojados.","Compré calcetines de lana.","I forgot to put on socks.","They are wet.","I bought wool socks."],["Umbrella","Paraguas","pah-RAH-gwahs","Llevo paraguas cuando llueve.","Protege de la lluvia.","Olvidé mi paraguas en la oficina.","I carry an umbrella when it rains.","It protects from rain.","I forgot my umbrella at the office."],["Watch","Reloj","reh-LOH","Llevo un reloj de oro.","Marca las tres en punto.","Necesito un reloj nuevo.","I wear a gold watch.","It shows three o'clock.","I need a new watch."],["Bag","Bolso","BOL-soh","Llevo mi bolso a todas partes.","El bolso rojo es de mi madre.","Perdí mi bolso en el mercado.","I carry my bag everywhere.","The red bag is my mother's.","I lost my bag at the market."],["Glasses","Gafas","GAH-fas","Necesito gafas para leer.","Mis gafas se rompieron.","Compré gafas nuevas ayer.","I need glasses to read.","My glasses broke.","I bought new glasses yesterday."]],"transport":[["Car","Coche","KOH-cheh","El coche es rojo y nuevo.","Fui al mercado en coche.","Necesita combustible.","The car is red and new.","I went to market by car.","It needs fuel."],["Bus","Autobús","ow-toh-BOOS","Tomo el autobús a la escuela.","El autobús llegó tarde.","Hay uno cada diez minutos.","I take the bus to school.","The bus arrived late.","There is one every ten minutes."],["Train","Tren","tren","Viajo en tren a Mumbai.","El tren va muy rápido.","La estación está lejos.","I travel by train to Mumbai.","The train goes very fast.","The station is far away."],["Airplane","Avión","ah-BYON","Viajamos en avión a Londres.","El avión despegó a tiempo.","El vuelo duró tres horas.","We travelled by plane to London.","The plane took off on time.","The flight lasted three hours."],["Bicycle","Bicicleta","bee-see-KLEH-tah","Voy al parque en bicicleta.","Es buena para la salud.","Me regalaron una bicicleta.","I go to the park by bicycle.","Cycling is good for health.","I was gifted a bicycle."],["Ship","Barco","BAR-koh","El barco navega por el mar.","Vi un barco en el puerto.","El viaje duró dos días.","The ship sails across the sea.","I saw a ship at the port.","The journey lasted two days."],["Motorcycle","Moto","MOH-toh","Mi padre tiene una moto roja.","Va muy rápido.","Siempre usa casco.","My father has a red motorcycle.","It goes very fast.","Always wear a helmet."],["Taxi","Taxi","tak-see","Llamé un taxi para el aeropuerto.","Llegó en cinco minutos.","Fue rápido y cómodo.","I called a taxi for the airport.","It arrived in five minutes.","It was fast and comfortable."],["Auto Rickshaw","Rickshaw","rik-shaw","Tomé un rickshaw al mercado.","Es barato y práctico.","El conductor fue amable.","I took a rickshaw to the market.","It is cheap and practical.","The driver was kind."],["Boat","Bote","BOH-teh","Fui en bote al lago.","Se movía con el viento.","Disfrutamos el paseo.","I went by boat to the lake.","It moved with the wind.","We enjoyed the boat ride."],["Metro","Metro","MEH-troh","Tomé el metro al centro.","Es rápido en la ciudad.","La estación está cerca.","I took the metro to the centre.","It is fast in the city.","The station is nearby."]],"emotions":[["Happy","Feliz","feh-LEES","Estoy muy feliz hoy.","Me siento feliz con mi familia.","La música me hace feliz.","I am very happy today.","I feel happy with my family.","Music makes me happy."],["Sad","Triste","TREES-teh","Me siento triste hoy.","El niño llora porque está triste.","Me puse triste con la noticia.","I feel sad today.","The child cries because it is sad.","I became sad with the news."],["Angry","Enojado","eh-noh-HAH-doh","Estoy enojado contigo.","No te enojes por eso.","El maestro estaba enojado.","I am angry with you.","Do not get angry about that.","The teacher was angry."],["Scared","Asustado","ah-soos-TAH-doh","El niño está asustado por el trueno.","Me asusté cuando vi la araña.","No tengas miedo de la oscuridad.","The child is scared of thunder.","I got scared seeing the spider.","Do not be afraid of the dark."],["Surprised","Sorprendido","sor-pren-DEE-doh","Estoy muy sorprendido.","Me sorprendieron con un regalo.","La noticia me sorprendió.","I am very surprised.","They surprised me with a gift.","The news surprised me."],["Excited","Emocionado","eh-mo-syo-NAH-doh","Estoy emocionado por el viaje.","Los niños están emocionados.","Me siento muy emocionado hoy.","I am excited about the trip.","The children are excited.","I feel very excited today."],["Tired","Cansado","kan-SAH-doh","Estoy muy cansado después del trabajo.","El niño está cansado después de jugar.","Duermo bien cuando estoy cansado.","I am very tired after work.","The child is tired after playing.","I sleep well when tired."],["Proud","Orgulloso","or-goo-YOH-soh","Estoy orgulloso de ti.","Me siento orgulloso de mi trabajo.","Los padres están orgullosos.","I am proud of you.","I feel proud of my work.","The parents are proud."],["Bored","Aburrido","ah-boo-RREE-doh","Estoy aburrido en casa.","El niño se aburre sin amigos.","Me aburro cuando no hay nada.","I am bored at home.","The child gets bored without friends.","I get bored when there is nothing to do."],["Nervous","Nervioso","ner-BYOH-soh","Estoy nervioso antes del examen.","Me pongo nervioso al hablar en público.","Es normal sentirse nervioso.","I am nervous before the exam.","I get nervous speaking in public.","It is normal to feel nervous."]],"opposites":[["Big / Small","Grande / Pequeño","GRAN-deh/peh-KEN-yoh","El elefante es grande, el ratón es pequeño.","Esta casa es muy grande.","Mi bolso es pequeño pero útil.","The elephant is big, the mouse is small.","This house is very big.","My bag is small but useful."],["Fast / Slow","Rápido / Lento","RAH-pee-doh/LEN-toh","El coche es rápido, la tortuga es lenta.","Camina más rápido o llegarás tarde.","El tren lento llegó tarde.","The car is fast, the turtle is slow.","Walk faster or you will be late.","The slow train arrived late."],["Hot / Cold","Caliente / Frío","kah-LYEN-teh/FREE-oh","El café está caliente y el agua fría.","Este verano es muy caliente.","El invierno es frío aquí.","The coffee is hot and the water cold.","This summer is very hot.","Winter is cold here."],["New / Old","Nuevo / Viejo","NWEH-boh/BYEH-hoh","Compré un teléfono nuevo.","El edificio viejo fue demolido.","Prefiero libros nuevos a viejos.","I bought a new phone.","The old building was demolished.","I prefer new books to old ones."],["Good / Bad","Bueno / Malo","BWEH-noh/MAH-loh","Este es un buen libro.","La comida mala te enferma.","Hoy fue un buen día.","This is a good book.","Bad food makes you sick.","Today was a good day."],["Day / Night","Día / Noche","DEE-ah/NOH-cheh","El día es brillante, la noche oscura.","Trabajo de día y descanso de noche.","El cielo es azul de día.","The day is bright, the night is dark.","I work by day and rest at night.","The sky is blue by day."],["Up / Down","Arriba / Abajo","ah-RREE-bah/ah-BAH-hoh","El avión vuela arriba de las nubes.","El precio del petróleo bajó.","Sube arriba y baja la caja.","The plane flies above the clouds.","The price of oil went down.","Go up and bring the box down."],["Open / Closed","Abierto / Cerrado","ah-BYER-toh/seh-RRAH-doh","La tienda está abierta hoy.","La puerta está cerrada con llave.","El banco está abierto de lunes a viernes.","The shop is open today.","The door is locked closed.","The bank is open Monday to Friday."],["Love / Hate","Amor / Odio","ah-MOR/OH-dyoh","El amor hace el mundo mejor.","No odies a nadie.","Siento amor por mi familia.","Love makes the world better.","Do not hate anyone."," rk.","I have a lot of homework this week."],["Exam","Examen","ex-AH-men","Tengo examen mañana.","Estudié mucho para el examen.","Aprobé el examen con buena nota.","I have an exam tomorrow.","I studied a lot for the exam.","I passed the exam with a good grade."],["School","Escuela","es-KWEH-lah","Voy a la escuela todos los días.","Mi escuela tiene un gran jardín.","La escuela termina a las tres.","I go to school every day.","My school has a big garden.","School ends at three o'clock."],["Principal","Director","dee-rek-TOR","El director habla con los padres.","El director es muy estricto.","La directora es amable.","The principal talks with parents.","The principal is very strict.","The principal is kind."],["Uniform","Uniforme","oo-nee-FOR-meh","Llevo uniforme a la escuela.","El uniforme es azul y blanco.","Me puse el uniforme por la mañana.","I wear a uniform to school.","The uniform is blue and white.","I put on my uniform in the morning."]],"home":[["Kitchen","Cocina","koh-SEE-nah","La cocina huele bien.","Mamá cocina en la cocina.","Limpiamos la cocina hoy.","The kitchen smells good.","Mum cooks in the kitchen.","We cleaned the kitchen today."],["Bedroom","Dormitorio","dor-mee-TOR-yoh","Mi dormitorio es cómodo.","Duermo en mi dormitorio.","Limpié mi dormitorio hoy.","My bedroom is comfortable.","I sleep in my bedroom.","I cleaned my bedroom today."],["Bathroom","Baño","BAH-nyoh","El baño está limpio.","Me ducho en el baño.","El baño tiene una bañera grande.","The bathroom is clean.","I shower in the bathroom.","The bathroom has a big bathtub."],["Living Room","Sala de estar","SAH-lah deh es-TAR","La sala de estar es grande.","La familia se reúne en la sala.","Vemos televisión en la sala.","The living room is large.","The family gathers in the living room.","We watch TV in the living room."],["Dining Room","Comedor","koh-meh-DOR","La familia come en el comedor.","El comedor tiene una mesa grande.","Decoramos el comedor para Navidad.","The family eats in the dining room.","The dining room has a big table.","We decorated the dining room for Christmas."],["Garden","Jardín","har-DEEN","El jardín está lleno de flores.","Papá trabaja en el jardín.","Plantamos árboles en el jardín.","The garden is full of flowers.","Dad works in the garden.","We planted trees in the garden."],["Garage","Garaje","gah-RAH-heh","El garaje tiene dos coches.","Papá repara el coche en el garaje.","El garaje está desordenado.","The garage has two cars.","Dad fixes the car in the garage.","The garage is messy."],["Balcony","Balcón","bal-KON","El balcón tiene flores bonitas.","Tomamos el té en el balcón.","Veo la puesta de sol desde el balcón.","The balcony has beautiful flowers.","We drink tea on the balcony.","I watch the sunset from the balcony."],["Roof","Techo","TEH-choh","El techo es rojo.","Las palomas viven en el techo.","Reparamos el techo después de la lluvia.","The roof is red.","Pigeons live on the roof.","We repaired the roof after the rain."],["Stairs","Escaleras","es-kah-LEH-ras","Las escaleras son muy empinadas.","Subí las escaleras corriendo.","Las escaleras llevan al segundo piso.","The stairs are very steep.","I ran up the stairs.","The stairs lead to the second floor."]]},"hi":{"greetings":[["Hello","नमस्ते","Na-mas-te","नमस्ते, आप कैसे हैं?","नमस्ते जी, बहुत दिनों बाद!","नमस्ते! आज कैसा दिन है?","Hello, how are you?","Hello friend, hi there!","Hello! How is your day?"],["Good morning","सुप्रभात","Su-pra-bhaat","सुप्रभात! आज का दिन शुभ हो।","सुप्रभात, क्या नाश्ता किया?","सुप्रभात मम्मी!","Have a good day!","Good morning, did you have breakfast?","Good morning, Mum!"],["Good night","शुभ रात्रि","Shubh raa-tri","शुभ रात्रि, मीठे सपने आएं।","शुभ रात्रि, कल मिलते हैं।","शुभ रात्रि परिवार को।","Good night! Sweet dreams.","Good night, see you tomorrow.","Good night to the family."],["Thank you","धन्यवाद","DHAN-ya-vaad","आपकी मदद के लिए धन्यवाद।","बहुत धन्यवाद, आप बहुत अच्छे हैं।","इस उपहार के लिए धन्यवाद।","Thank you for your help.","Thank you so much, you are very kind.","Thank you for this gift."],["Please","कृपया","Kri-pa-yaa","कृपया यहाँ बैठिए।","कृपया मुझे माफ़ करें।","कृपया शांत रहें।","Please sit here.","Please forgive me.","Please stay calm."],["Excuse me","माफ़ करें","Maaf ka-ren","माफ़ करें, स्टेशन कहाँ है?","माफ़ करें, मुझे देर हो गई।","माफ़ करें, मदद करेंगे?","Excuse me, where is the station?","I am sorry, I am late.","Excuse me, will you help?"],["Yes","हाँ","Haan","हाँ, मैं समझ गया।","हाँ, मुझे अच्छा लगेगा।","हाँ, यह सही है।","Yes, I understand.","Yes, I would like that.","Yes, that is correct."],["No","नहीं","Na-hin","नहीं, धन्यवाद।","नहीं, मुझे नहीं चाहिए।","नहीं, यह सही नहीं है।","No, thank you.","No, I don't want it.","No, this is not right."],["How are you?","आप कैसे हैं?","Aap kai-se hain","आप कैसे हैं आजकल?","बहुत दिनों बाद! आप कैसे हैं?","सब ठीक है ना?","Hi, how are you today?","Long time no see! How are you?","Is everything okay?"],["See you later","फिर मिलेंगे","Phir mi-len-ge","ठीक है, फिर मिलेंगे।","फिर मिलेंगे, ख्याल रखना।","कल फिर मिलेंगे।","See you later!","See you later, take care.","See you tomorrow."],["You're welcome","कोई बात नहीं","Ko-i baat na-hin","कोई बात नहीं, खुशी हुई।","अरे कोई बात नहीं!","कोई बात नहीं, यही दोस्ती है।","You're welcome, it was a pleasure.","You're welcome! That's what I'm here for.","No problem, that's what friendship is."],["I'm sorry","मुझे माफ़ करो","Mu-jhe maaf kar-do","मुझे माफ़ करो, गलती हो गई।","मुझे सच में माफ़ करो।","माफ़ करो, जानबूझकर नहीं था।","Please forgive me, a mistake happened.","I'm sorry, it was my fault.","Sorry, it wasn't intentional."]],"food":[["Water","पानी","Paa-ni","एक गिलास पानी दीजिए।","पानी पियो, अच्छा लगेगा।","पानी की बोतल कहाँ है?","I want water, please.","Drink water, it will feel good.","Where is the water bottle?"],["Bread","ब्रेड","Bred","ब्रेड बहुत नरम है।","ब्रेड और मक्खन लाओ।","क्या घर में ब्रेड है?","The bread is very soft.","Bring bread and butter.","Is there bread at home?"],["Coffee","कॉफी","Kaa-fee","मुझे एक कप कॉफी चाहिए।","सुबह बिना कॉफी के नहीं चलता।","क्या आप कॉफी पीएंगे?","I would like one cup of coffee.","I cannot start the morning without coffee.","Will you have coffee?"],["Rice","चावल","Chaa-val","चावल अच्छी तरह पका है।","मुझे चावल बहुत पसंद है।","दाल-चावल खाओ।","The rice is very tasty.","I like rice very much.","Eat rice with dal."],["Milk","दूध","Doodh","एक गिलास दूध पियो।","दूध सेहत के लिए अच्छा है।","बच्चों को दूध पिलाओ।","Drink a glass of milk.","Milk is good for health.","Give milk to the children."],["Egg","अंडा","An-da","दो अंडे उबाल दो।","अंडा बहुत पौष्टिक होता है।","अंडे की भुर्जी बनाओ।","Boil two eggs.","The egg is very good.","Make egg bhurji."],["Chicken","चिकन","Chi-kan","चिकन करी बहुत स्वादिष्ट है।","आज चिकन खाएंगे।","बाज़ार से चिकन लाओ।","Chicken curry is very delicious.","We will eat chicken today.","Please bring chicken from the market."],["Fish","मछली","Mach-li","मछली बहुत स्वादिष्ट है।","मछली पकाई है आज।","मछली बाज़ार में ताज़ी है।","The fish is very delicious.","Fish is cooked today.","The fish is fresh in the market."],["Fruit","फल","Phal","रोज़ फल खाओ।","फल सेहत के लिए अच्छे हैं।","कौन से फल पसंद हैं?","Eat fruit daily.","Fruits are good for health.","What fruits do you have?"],["Vegetables","सब्जी","Sab-ji","आज कौन सी सब्जी बनी?","हरी सब्जी खाओ।","सब्जी बाज़ार से लाओ।","What vegetables were cooked today?","Eat green vegetables.","Bring vegetables from the market."],["I am hungry","मुझे भूख लगी है","Mu-jhe bhookh la-gi hai","मुझे बहुत भूख लगी है।","भूख लगी है, क्या खाना बना है?","बच्चे को भूख लगी है।","I am very hungry now.","I'm hungry! Shall we eat?","The child is hungry."],["Delicious","स्वादिष्ट","Swaa-dish-t","यह खाना बहुत स्वादिष्ट है!","आज का खाना बहुत स्वादिष्ट बना।","यह मिठाई बहुत स्वादिष्ट है।","This food is very delicious!","Today's food is very delicious.","This sweet is very delicious."],["Breakfast","नाश्ता","Naash-ta","नाश्ता तैयार है।","नाश्ते में क्या बना है?","नाश्ता करके जाओ।","Breakfast is ready.","What do you want fo acher was angry."],["Scared","डरा हुआ","Da-ra hua","बच्चा गड़गड़ाहट से डरा है।","मकड़ी देखकर डर गया।","अंधेरे से मत डरो।","The child is scared of thunder.","I got scared seeing the spider.","Do not be afraid of the dark."],["Surprised","हैरान","Hai-raan","बहुत हैरान हूँ।","उपहार देकर हैरान किया।","खबर सुनकर हैरान हो गया।","I am very surprised.","They surprised me with a gift.","The news surprised me."],["Excited","उत्साहित","Ut-saa-hit","यात्रा के लिए उत्साहित हूँ।","बच्चे उत्साहित हैं।","आज बहुत उत्साहित हूँ।","I am excited about the trip.","The children are excited.","I feel very excited today."],["Tired","थका हुआ","Tha-ka hua","काम के बाद बहुत थक गया।","बच्चा खेलने के बाद थक गया।","थका होने पर नींद अच्छी आती है।","I am very tired after work.","The child is tired after playing.","I sleep well when tired."],["Proud","गर्वित","Gar-vit","तुम पर गर्व है।","अपने काम पर गर्व।","माता-पिता को गर्व है।","I am proud of you.","I feel proud of my work.","The parents are proud."],["Bored","बोर","Bore","घर में बोर हो रहा हूँ।","दोस्तों के बिना बोर होता है।","कुछ न होने पर बोर हो जाता हूँ।","I am bored at home.","The child gets bored without friends.","I get bored when there is nothing to do."],["Nervous","घबराया हुआ","Gha-bra-ya hua","परीक्षा से पहले घबरा रहा हूँ।","सार्वजनिक बोलने पर घबरा जाता हूँ।","घबराना सामान्य है।","I am nervous before the exam.","I get nervous speaking in public.","It is normal to feel nervous."]],"opposites":[["Big / Small","बड़ा / छोटा","Ba-da/Chho-ta","हाथी बड़ा है, चूहा छोटा है।","यह घर बहुत बड़ा है।","थैला छोटा पर उपयोगी है।","The elephant is big, the mouse is small.","This house is very big.","My bag is small but useful."],["Fast / Slow","तेज़ / धीमा","Tez/Dhee-ma","कार तेज़ है, कछुआ धीमा।","तेज़ चलो वरना देर होगी।","धीमी ट्रेन देर से आई।","The car is fast, the turtle is slow.","Walk faster or you will be late.","The slow train arrived late."],["Hot / Cold","गर्म / ठंडा","Garm/Than-da","कॉफी गर्म है, पानी ठंडा।","इस गर्मी बहुत गर्मी है।","यहाँ सर्द  the stairs.","The stairs lead to the second floor."]]},"ta":{"greetings":[["Hello","வணக்கம்","Va-nak-kam","வணக்கம், நலமா இருக்கீங்களா?","வணக்கம்! எப்படி இருக்கீங்க?","வணக்கம், என்ன செய்றீங்க?","Hello, how are you?","Hello friend, hi there!","Hello, what are you doing?"],["Good morning","காலை வணக்கம்","Kaa-lai va-nak-kam","காலை வணக்கம்! இன்று நல்ல நாள்.","காலை வணக்கம் அம்மா!","காலை வணக்கம், காபி குடிங்களா?","Good morning! Today is a good day.","Good morning, mother!","Good morning, have you had coffee?"],["Good night","இரவு வணக்கம்","I-ra-vu va-nak-kam","இரவு வணக்கம், நல்லா தூங்குங்க.","இரவு வணக்கம் நண்பா!","இரவு வணக்கம், நாளைக்கு பார்க்கலாம்.","Good night, sleep well.","Good night, take care.","Good night, see you tomorrow."],["Thank you","நன்றி","Nan-ri","உங்கள் உதவிக்கு மிக்க நன்றி.","ரொம்ப நன்றி!","இந்த அன்பிற்கு நன்றி.","Thank you for your help.","Thank you very much!","Thank you for this kindness."],["Please","தயவுசெய்து","Tha-ya-vu-sey-thu","தயவுசெய்து இங்கே உட்காருங்கள்.","தயவுசெய்து சத்தம் போடாதீங்க.","தயவுசெய்து உதவி செய்யுங்கள்.","Please sit here.","Please don't make noise.","Please help me."],["Excuse me","மன்னிக்கவும்","Man-nik-ka-vum","மன்னிக்கவும், ஸ்டேஷன் எங்கே?","மன்னிக்கவும், நான் தாமதமாக வந்தேன்.","மன்னிக்கவும், கொஞ்சம் நகருங்கள்.","Excuse me, where is the station?","I'm sorry, I came late.","Excuse me, please move a little."],["Yes","ஆமாம்","Aa-maam","ஆமாம், நான் புரிஞ்சுக்கிட்டேன்.","ஆமாம், எனக்கு விருப்பம்.","ஆமாம், இது சரிதான்.","Yes, I understand.","Yes, I would like that.","Yes, that is correct."],["No","இல்லை","Il-lai","இல்லை, நன்றி.","இல்லை, எனக்கு வேண்டாம்.","இல்லை, அது தப்பு.","No, thank you.","No, I don't want it.","No, that is not right."],["How are you?","நீங்கள் எப்படி இருக்கீங்க?","Neen-ga-lu ep-pa-di i-ruk-keen-ga","நீங்கள் எப்படி இருக்கீங்க?","என்ன செய்றீங்க, நலமா?","குடும்பம் எல்லாரும் நலமா?","Hi, how are you today?","How are you, are you well?","Is the whole family well?"],["See you later","பிறகு பார்க்கலாம்","Pi-ra-gu paar-k-ka autiful.","She is wearing a yellow saree."],["Black","கருப்பு","Ka-rup-pu","என்னோட பூனை கருப்பு நிறம்.","கருப்பு ஆடை அணிந்திருந்தாங்க.","இரவில் வானம் கருப்பா இருக்கு.","My cat is black.","They wore a black dress.","The sky is black at night."],["White","வெள்ளை","Vel-lai","பனி வெள்ளை நிறம்.","வெள்ளை சட்டை சுத்தமா இருக்கு.","வெள்ளை புறா பறக்குது.","Snow is very white.","The white shirt looks clean.","A white pigeon is flying."],["Orange","ஆரஞ்சு","Aa-ran-chu","ஆரஞ்சு பழம் இனிக்கும்.","மாலை வானம் ஆரஞ்சு நிறம்.","ஆரஞ்சு நிற குளிர்பானம் வேணும்.","The orange is orange colored.","The sky is orange at sunset.","I like orange juice."],["Pink","இளஞ்சிவப்பு","I-lan-si-vap-pu","இளஞ்சிவப்பு பூக்கள் அழகா இருக்கு.","இளஞ்சிவப்பு உடை அணிந்திருந்தாள்.","குழந்தைக்கு இளஞ்சிவப்பு பிடிக்கும்.","The flowers are pink.","My room is pink.","She wears nice pink shoes."],["Purple","ஊதா","Oo-thaa","ஊதா நிற பூக்கள் அழகா இருக்கு.","ஊதா நிற சட்டை அணிந்திருந்தான்.","ஊதா நிறம் எனக்கு பிடிக்கும்.","The flower is purple.","She wears a purple scarf.","Purple is an elegant color."],["Brown","பழுப்பு","Pa-lup-pu","பழுப்பு நிற நாய் அழகா இருக்கு.","பழுப்பு நிற மரத்தடி சுத்தமா இருக்கு.","பழுப்பு நிற சாக்லேட் சுவையா இருக்கு.","Chocolate is brown.","My dog is dark brown.","Trees have brown trunks."]],"family":[["Mother","அம்மா","Am-maa","அம்மா சமையல் ரொம்ப நல்லா இருக்கு.","அம்மாவை கூப்பிடுங்க.","அம்மா எங்களை ரொம்ப நேசிக்கிறாங்க.","My mother cooks very well.","Call your mother now.","Mother always takes care of us."],["Father","அப்பா","Ap-paa","அப்பா வேலைக்கு போனாங்க.","அப்பாகிட்ட பேசுங்க.","அப்பாவை மதிக்கணும்.","My father works very hard.","Father arrived home late.","I love my father very much."],["Brother","அண்ணன்","An-nan","என் அண்ணன் பெரியவன்.","அண்ணனோட சேர்ந்து விளையாடுவேன்.","அண்ணன் திருமணம் இருக்கு.","My older brother studies medicine.","I play with my brother every day.","Do you have siblings?"],["Sister","அக்கா","Ak-kaa","என் அக்கா ரொம்ப புத்திசாலி.","அக்காவை பார்க்க போகணும்.","அக்காவோட பிறந்தநாள் இன ay.","There is a meeting on Wednesday.","I will study on Wednesday."],["Thursday","வியாழக்கிழமை","Vi-yaa-la","வியாழக்கிழமை கோவில் போவோம்.","வியாழக்கிழமை விழா இருக்கு.","வியாழக்கிழமை அலுவலகம் விடுமுறை.","Let's go to the temple on Thursday.","There is a festival on Thursday.","The office is closed on Thursday."],["Friday","வெள்ளிக்கிழமை","Vel-li","வெள்ளிக்கிழமை வந்துடுச்சு!","வெள்ளிக்கிழமை ஷாப்பிங் போவோம்.","வெள்ளிக்கிழமை ரிலீஸ் ஆகும்.","Finally it is Friday today!","Let's go shopping on Friday.","The movie releases on Friday."],["Saturday","சனிக்கிழமை","Sa-ni","சனிக்கிழமை ஓய்வு நாள்.","சனிக்கிழமை குடும்பத்தோட இருப்போம்.","சனிக்கிழமை பார்ட்டி இருக்கு.","Saturday is a rest day.","We'll be with family on Saturday.","There is a party on Saturday."],["Sunday","ஞாயிற்றுக்கிழமை","Nyaa-yiru","ஞாயிற்றுக்கிழமை குடும்ப நேரம்.","ஞாயிற்றுக்கிழமை கோவில் போவோம்.","ஞாயிற்றுக்கிழமை நிறைய தூங்குவேன்.","Sunday is family day.","We go to church on Sundays.","I sleep a lot on Sundays."]],"body":[["Head","தலை","Tha-lai","தலை வலிக்குது.","தலையில் தொப்பி போடு.","தலையை ஆட்டாதே.","I have a bad headache.","I wear a hat on my head.","Don't shake your head."],["Eye","கண்","Kan","கண் வலிக்குது.","கண்களை பாதுகாங்க.","கண்களை திறந்து பாரு.","The eye hurts.","Always take care of your eyes!","Open your eyes and see."],["Ear","காது","Kaa-thu","காது வலிக்குது.","காதை சுத்தமா வச்சுக்கோ.","காது கொடுத்து கேளு.","My left ear hurts.","Keep your ear clean.","Listen carefully."],["Nose","மூக்கு","Mook-ku","மூக்கு ஒழுகுது.","மூக்கை சுத்தமா வச்சுக்கோ.","மூக்கிலே சுவாசி.","My nose is very blocked.","Keep your nose clean.","Breathe through your nose."],["Mouth","வாய்","Vaa-y","வாய் திரக்காதே.","வாய் கழுவு.","வாயை மூடு சாப்பிடும்போது.","Don't open your mouth.","Wash your mouth.","Close your mouth while eating."],["Hand","கை","Kai","கை கொடு.","கைகளை கழுவுங்க.","கை வலிக்குது.","Give me your hand, please.","Wash your hands before eating.","The hand hurts."],["Foot","கால்","Kaal","கால் வலிக்குது.","கால்களை கழுவு.","கால்  a hundred paise.","I ran a hundred metres.","A hundred people at the wedding."]],"months":[["January","ஜனவரி","Ja-na-va-ri","ஜனவரி ஆண்டின் முதல் மாதம்.","ஜனவரியில் குளிரா இருக்கும்.","என் பிறந்தநாள் ஜனவரியில்.","January is the first month.","It is cold in January.","My birthday is in January."],["February","பிப்ரவரி","Pip-ra-va-ri","பிப்ரவரி சிறிய மாதம்.","வேலன்டைன் டே பிப்ரவரியில்.","பிப்ரவரியில் இருபத்தெட்டு நாட்கள்.","February is the shortest month.","Valentine's Day is in February.","February has twenty-eight days."],["March","மார்ச்","Maarch","மார்ச் மூன்றாம் மாதம்.","வசந்தம் மார்ச்சில் வரும்.","என் தேர்வு மார்ச்சில்.","March is the third month.","Spring comes in March.","My exam is in March."],["April","ஏப்ரல்","Ep-ral","ஏப்ரல் நான்காம் மாதம்.","ஏப்ரலில் நிறைய மழை.","என் பிறந்தநாள் ஏப்ரலில்.","April is the fourth month.","It rains a lot in April.","My birthday is in April."],["May","மே","Me","மே ஐந்தாம் மாதம்.","மேயில் பூக்கள் பூக்கும்.","மேயில் பட்டமளிப்பு.","May is the fifth month.","Flowers bloom in May.","Graduation is in May."],["June","ஜூன்","Jun","ஜூன் ஆறாம் மாதம்.","ஜூனில் கோடை விடுமுறை.","என் கல்யாணம் ஜூனில்.","June is the sixth month.","Summer holidays are in June.","My wedding is in June."],["July","ஜூலை","Ju-lai","ஜூலை ஏழாம் மாதம்.","ஜூலையில் மழைக்காலம் வரும்.","ஜூலையில் வெப்பமா இருக்கும்.","July is the seventh month.","Monsoon comes in July.","It is hot in July."],["August","ஆகஸ்ட்","Aa-gas-t","ஆகஸ்ட் எட்டாம் மாதம்.","ஆகஸ்ட் பதினைந்து சுதந்திர தினம்.","ஆகஸ்டில் மழை பெய்யும்.","August is the eighth month.","August fifteenth is Independence Day.","It rains in August."],["September","செப்டம்பர்","Sep-tam-bar","செப்டம்பரில் முப்பது நாட்கள்.","செப்டம்பரில் குளிர் ஆரம்பிக்கும்.","செப்டம்பரில் பள்ளி திறக்கும்.","September has thirty days.","Cold starts in September.","School opens in September."],["October","அக்டோபர்","Ak-to-bar","அக்டோபரில் முப்பத்தொரு நாட்கள்.","தீபாவளி அக்டோபரில்.","அக்டோபரில் இலைகள் உதிரும்.","October has thirty-one days.","Diwali is in October.","Leaves fall in October."],["November","நவம்பர்","Na-vam-bar","நவம்பரில் முப்பது நாட்கள்.","நவம்பரில் குளிர் வரும்.","என் பிறந்தநாள் நவம்பரில்.","November has thirty days.","Cold comes in November.","My birthday is in November."],["December","டிசம்பர்","Di-sam-bar","டிசம்பர் கடைசி மாதம்.","கிறிஸ்மஸ் டிசம்பரில்.","டிசம்பரில் ரொம்ப குளிரா இருக்கும்.","December is the last month.","Christmas is in December.","It is very cold in December."]],"animals":[["Dog","நாய்","Naa-y","நாய் சத்தமா குரைக்குது.","என் நாய் பேரு மேக்ஸ்.","நாய் நம்ம நண்பன்.","The dog barks loudly.","My dog is named Max.","The dog is our friend."],["Cat","பூனை","Poo-nai","பூனை நாள் முழுக்க தூங்குது.","என் பூனை பால் குடிக்குது.","பூனை மரம் ஏறிடுச்சு.","The cat sleeps all day.","My cat drinks milk.","The cat climbed the tree."],["Elephant","யானை","Yaa-nai","யானை மிகப் பெரிய விலங்கு.","யானைக்கு நீண்ட துதிக்கை இருக்கு.","மிருகக்காட்சியில் யானை பார்த்தேன்.","The elephant is the largest animal.","It has a long trunk.","I saw an elephant at the zoo."],["Tiger","புலி","Pu-li","புலி மிகவும் வலிமையான விலங்கு.","புலி இந்தியாவின் தேசிய விலங்கு.","காட்டில் புலி பார்த்தேன்.","The tiger is a powerful animal.","It is India's national animal.","I saw a tiger in the forest."],["Bird","பறவை","Pa-ra-vai","பறவை மரத்தில் பாடுது.","வண்ணமயமான பறவை பார்த்தேன்.","பறவை வானத்தில் பறக்குது.","The bird sings in the tree.","I saw a colourful bird.","The bird flies high."],["Fish","மீன்","Meen","மீன் ஆற்றில் நீந்துது.","வண்ண மீன்கள் பார்த்தேன்.","மீன் உடம்புக்கு நல்லது.","The fish swims in the river.","I saw colourful fish.","Fish is good for health."],["Cow","பசு","Pa-su","பசு பால் கொடுக்குது.","பசு வயல்ல மேயுது.","இந்தியாவில் பசு புனிதமானது.","The cow gives fresh milk.","The cow grazes in the field.","The cow is sacred in India."],["Monkey","குரங்கு","Ku-ran-gu","குரங்கு மரத்திலிருந்து மரத்துக்கு தாவுது.","குரங்கு வாழைப்பழம் சாப்பிடுது.","குரங்குகள் காட்டிலே வாழ்கிறாங்க.","The monkey jumps tree to tree.","The monkey eats a banana.","Monkeys live in the jungle."],["Lion","சிங்கம்","Sin-gam","சிங்கம் காட்டின் ராஜா.","சிங்கம் சத்தமா கர்ஜிக்குது.","சஃபாரியில் சிங்கம் பார்த்தேன்.","The lion is king of the jungle.","The lion roars loudly.","I saw a lion on safari."],["Rabbit","முயல்","Mu-yal","முயல் கேரட் சாப்பிடுது.","நீண்ட காதுகள் இருக்கு.","வேகமா குதிக்குது.","The rabbit eats carrots.","It has long ears.","The rabbit jumps fast."],["Butterfly","வண்ணத்துப்பூச்சி","Van-na-thu-poo-chi","வண்ணத்துப்பூச்சி பூவிலிருந்து பூவுக்கு பறக்குது.","வண்ணமயமான சிறகுகள்.","தோட்டத்தில் பார்த்தேன்.","The butterfly flies flower to flower.","It has colourful wings.","I saw a butterfly in the garden."],["Horse","குதிரை","Ku-thi-rai","குதிரை மிகவும் வேகமா ஓடுது.","புல்லை சாப்பிடுது.","ஜாக்கி குதிரையை ஓட்டினான்.","The horse runs very fast.","It eats grass in the field.","The jockey rode the horse."]],"clothing":[["Shirt","சட்டை","Sat-tai","நீல சட்டை போட்டுக்கிட்டேன்.","சட்டை அழுக்கா இருக்கு.","புது சட்டை வாங்கினேன்.","I put on a blue shirt.","The shirt is dirty.","I bought a new shirt."],["Pants","பாண்ட்","Paand","கருப்பு பாண்ட் போட்டேன்.","ரொம்ப நீளமா இருக்கு.","அந்த பாண்ட் நல்லா இருக்கு.","I put on black pants.","They are too long.","Those pants suit you well."],["Dress","பாவாடை","Paa-va-dai","அவள் சிவப்பு பாவாடை போட்டிருக்காள்.","பாவாடை மிகவும் அழகு.","கல்யாணத்துக்கு பாவாடை வாங்கினோம்.","She wears a red dress.","The dress is very beautiful.","We bought a dress for the wedding."],["Shoes","செருப்பு","Se-rup-pu","கருப்பு செருப்பு போட்டேன்.","செருப்பு அழுக்கு.","பள்ளிக்கு செருப்பு வாங்கினேன்.","I put on black shoes.","My shoes are dirty.","I bought shoes for school."],["Hat","தொப்பி","Top-pi","வெளியே போகும்போது தொப்பி போட்டேன்.","வெயிலில் இருந்து காக்குது.","பிடித்த தொப்பி தொலைஞ்சுடுச்சு.","I put on a hat going out.","It protects from the sun.","I lost my favourite hat."],["Jacket","ஜாக்கெட்","Jacket","குளிரா இருக்கு, ஜாக்கெட் போடு.","நீல ஜாக்கெட் என்னோடது.","குளிர்காலத்துக்கு வாங்கினோம்.","Wear a jacket, it is cold.","The blue jacket is mine.","We bought jackets for winter."],["Socks","சாக்ஸ்","Socks","சாக்ஸ் போட மறந்துட்டேன்.","நனைஞ்சிருக்கு.","ஊலன் சாக்ஸ் வாங்கினேன்.","I forgot to put on socks.","They are wet.","I bought wool socks."],["Umbrella","குடை","Ku-dai","மழையில் குடை எடுக்கிறேன்.","மழையில் இருந்து காக்குது.","ஆபீஸில் குடை மறந்துட்டேன்.","I carry an umbrella when it rains.","It protects from rain.","I forgot my umbrella at the office."],["Watch","கடிகாரம்","Ka-di-kaa-ram","தங்க கடிகாரம் அணிகிறேன்.","மூன்று மணி காட்டுது.","புது கடிகாரம் வேணும்.","I wear a gold watch.","It shows three o'clock.","I need a new watch."],["Bag","பை","Pai","என் பை எல்லா இடத்தும் எடுக்கிறேன்.","சிவப்பு பை அம்மாவோடது.","சந்தையில் பை தொலைஞ்சுடுச்சு.","I carry my bag everywhere.","The red bag is my mother's.","I lost my bag at the market."],["Glasses","கண்ணாடி","Kan-naa-di","படிக்க கண்ணாடி தேவை.","கண்ணாடி உடைஞ்சுடுச்சு.","நேத்து புது கண்ணாடி வாங்கினேன்.","I need glasses to read.","My glasses broke.","I bought new glasses yesterday."]],"transport":[["Car","கார்","Kaar","கார் சிவப்பு புதியதா.","காரில் சந்தைக்கு போனேன்.","பெட்ரோல் தேவை.","The car is red and new.","I went to market by car.","It needs fuel."],["Bus","பஸ்","Bus","பள்ளிக்கு பஸ்ல போகிறேன்.","பஸ் லேட்டா வந்தது.","பத்து நிமிடத்துக்கு ஒரு பஸ்.","I take the bus to school.","The bus arrived late.","There is one every ten minutes."],["Train","ரயில்","Ra-yil","ரயிலில் மும்பை போகிறேன்.","ரயில் வேகமா போகுது.","நிலையம் தொலைவில்.","I travel by train to Mumbai.","The train goes very fast.","The station is far away."],["Airplane","விமானம்","Vi-maa-nam","விமானத்தில் லண்டன் போனோம்.","சரியான நேரத்தில் புறப்பட்டது.","பயணம் மூன்று மணி நேரம்.","We travelled by plane to London.","The plane took off on time.","The flight lasted three hours."],["Bicycle","சைக்கிள்","Sai-ki-l","சைக்கிளில் பூங்காவுக்கு.","உடம்புக்கு நல்லது.","புது சைக்கிள் பரிசா கிடைச்சது.","I go to the park by bicycle.","Cycling is good for health.","I was gifted a bicycle."],["Ship","கப்பல்","Kap-pal","கப்பல் கடலில் பயணிக்குது.","துறைமுகத்தில் கப்பல் பார்த்தேன்.","பயணம் இரண்டு நாட்கள்.","The ship sails across the sea.","I saw a ship at the port.","The journey lasted two days."],["Motorcycle","மோட்டார்சைக்கிள்","Mo-tar-sai-ki-l","அப்பாவுக்கு சிவப்பு மோட்டார்சைக்கிள்.","வேகமா போகுது.","ஹெல்மெட் போடு.","My father has a red motorcycle.","It goes very fast.","Always wear a helmet."],["Taxi","டாக்சி","Taxi","ஏர்போர்ட்டுக்கு டாக்சி அழைத்தேன்.","ஐந்து நிமிடத்தில் வந்தது.","வேகமா வசதியா.","I called a taxi for the airport.","It arrived in five minutes.","It was fast and comfortable."],["Auto Rickshaw","ஆட்டோரிக்ஷா","Auto-rik-sha","சந்தைக்கு ஆட்டோ எடுத்தேன்.","மலிவானது.","ஆட்டோகாரர் அன்பாக.","I took an auto to the market.","It is cheap and convenient.","The driver was kind."],["Boat","படகு","Pa-da-gu","படகில் ஏரிக்கு போனேன்.","காற்றில் நகர்ந்தது.","ரொம்ப நல்லா இருந்தது.","I went by boat to the lake.","It moved with the wind.","We enjoyed the boat ride."],["Metro","மெட்ரோ","Metro","மெட்ரோவில் போனேன்.","வேகமா.","நிலையம் அருகில்.","I took the metro to the centre.","It is fast in the city.","The station is nearby."]],"emotions":[["Happy","மகிழ்ச்சியாக","Ma-gi-ch-chi-yaa-ga","இன்னைக்கு மிகவும் மகிழ்ச்சியா.","மகிழ்ச்சியா இருக்கேன்.","இசை மகிழ்விக்குது.","I am very happy today.","I feel happy.","Music makes me happy."],["Sad","சோகமாக","So-ga-maa-ga","இன்னைக்கு சோகமா இருக்கேன்.","குழந்தை சோகமா அழுகிறது.","செய்தி கேட்டு சோகமா போனேன்.","I feel sad today.","The child cries because it is sad.","I became sad with the news."],["Angry","கோபமாக","Ko-ba-maa-ga","உன்னோட கோபமா இருக்கேன்.","கோபப்படாதே.","ஆசிரியர் கோபமா இருந்தார்.","I am angry with you.","Do not get angry about that.","The teacher was angry."],["Scared","பயமாக","Pa-ya-maa-ga","குழந்தை இடியை கண்டு பயப்படுது.","சிலந்தியை பார்த்து பயம்.","இருட்டை பார்த்து பயப்படாதே.","The child is scared of thunder.","I got scared seeing the spider.","Do not be afraid of the dark."],["Surprised","ஆச்சரியமாக","Aa-ch-cha-ri-ya-maa-ga","மிகவும் ஆச்சரியமா.","பரிசு கொடுத்து ஆச்சரியப்படுத்தினாங்க.","செய்தி கேட்டு ஆச்சரியம்.","I am very surprised.","They surprised me with a gift.","The news surprised me."],["Excited","உற்சாகமாக","Ur-saa-ga-maa-ga","பயணத்துக்கு உற்சாகமா.","பிள்ளைகள் உற்சாகமா.","இன்னைக்கு மிகவும் உற்சாகம்.","I am excited about the trip.","The children are excited.","I feel very excited today."],["Tired","சோர்வாக","Sor-vaa-ga","வேலைக்கு பிறகு சோர்வா.","விளையாட்டுக்கு பிறகு சோர்வு.","சோர்வா இருக்கும்போது நிद்ரை வருது.","I am very tired after work.","The child is tired after playing.","I sleep well when tired."],["Proud","பெருமையாக","Pe-ru-mai-yaa-ga","உன்னை பார்த்து பெருமையா.","என் வேலையை பார்த்து பெருமை.","பெற்றோர் பெருமையா.","I am proud of you.","I feel proud of my work.","The parents are proud."],["Bored","சலிப்பாக","Sa-lip-paa-ga","வீட்டிலே சலிப்பா இருக்கேன்.","நண்பர்கள் இல்லாம சலிக்குது.","ஒன்னும் செய்ய இல்லாம சலிப்பு.","I am bored at home.","The child gets bored without friends.","I get bored when there is nothing to do."],["Nervous","பதட்டமாக","Pa-tat-ta-maa-ga","தேர்வுக்கு முன்னால் பதட்டம்.","பொதுவிடத்தில் பேசும்போது பதட்டம்.","சில நேரம் பதட்டம் இயல்பு.","I am nervous before the exam.","I get nervous speaking in public.","It is normal to feel nervous."]],"opposites":[["Big / Small","பெரிய / சிறிய","Pe-ri-ya/Si-ri-ya","யானை பெரியது, எலி சிறியது.","இந்த வீடு மிகவும் பெரியது.","பை சிறியது ஆனால் பயனுள்ளது.","The elephant is big, the mouse is small.","This house is very big.","My bag is small but useful."],["Fast / Slow","வேகமான / மெதுவான","Ve-ga-maan/Me-thu-vaan","கார் வேகமானது, ஆமை மெதுவானது.","வேகமா நட, தாமதமா ஆகும்.","மெதுவான ரயில் தாமதம்.","The car is fast, the turtle is slow.","Walk faster or you will be late.","The slow train arrived late."],["Hot / Cold","சூடான / குளிர்ந்த","Soo-daa-na/Ku-lir-ntha","காபி சூடு, தண்ணீர் குளிர்ச்சி.","இந்த கோடை மிகவும் சூடு.","இங்கே குளிர்காலம் குளிரா.","The coffee is hot and the water cold.","This summer is very hot.","Winter is cold here."],["New / Old","புது / பழைய","Pu-thu/Pa-lai-ya","புது போன் வாங்கினேன்.","பழைய கட்டிடம் இடிக்கப்பட்டது.","புது புத்தகம் பிடிக்கும்.","I bought a new phone.","The old building was demolished.","I prefer new books to old ones."],["Good / Bad","நல்ல / கெட்ட","Nal-la/Ket-ta","இது ஒரு நல்ல புத்தகம்.","கெட்ட உணவு நோய் தரும்.","இன்னைக்கு நல்ல நாள்.","This is a good book.","Bad food makes you sick.","Today was a good day."],["Day / Night","பகல் / இரவு","Pa-gal/I-ra-vu","பகல் வெளிச்சம், இரவு இருட்டு.","பகலில் வேலை, இரவில் ஓய்வு.","பகலில் வானம் நீலம்.","The day is bright, the night is dark.","I work by day and rest at night.","The sky is blue by day."],["Up / Down","மேலே / கீழே","Me-le/Kee-ze","விமானம் மேகங்களுக்கு மேலே.","எண்ணெய் விலை கீழே.","மேலே போய் பெட்டி கீழே கொண்டா.","The plane flies above the clouds.","The price of oil went down.","Go up and bring the box down."],["Open / Closed","திறந்த / மூடிய","Thi-ran-tha/Moo-di-ya","இன்னைக்கு கடை திறந்திருக்கு.","கதவு பூட்டி மூடியிருக்கு.","திங்கள் வெள்ளி வங்கி திறந்திருக்கும்.","The shop is open today.","The door is locked closed.","The bank is open Monday to Friday."],["Love / Hate","அன்பு / வெறுப்பு","An-bu/Ve-rup-pu","அன்பு உலகை நல்லதாக்குது.","யாரையும் வெறுக்காதே.","குடும்பத்தின் மீது அன்பு.","Love makes the world better.","Do not hate anyone.","I feel love for my family."],["Win / Lose","வெல்வது / தோல்வி","Vel-va-thu/Tol-vi","போட்டியில் வெல்ல விரும்புகிறேன்.","தோல்வி பிடிக்கல.","இன்னைக்கு வென்றோம்.","I want to win the competition.","I do not like to lose.","We won the match today."]],"school":[["Teacher","ஆசிரியர்","Aa-si-ri-yar","ஆசிரியர் பாடம் விளக்குகிறார்.","மிகவும் பொறுமையானவர்.","வாசலுக்கு வந்தார்.","The teacher explains the lesson.","My teacher is very patient.","The teacher arrived early today."],["Student","மாணவர்","Maa-na-var","மாணவர் நிறைய படிக்கிறார்.","ஆசிரியரை கேட்கிறார்கள்.","நான் மொழி மாணவன்.","The student studies a lot.","Students listen to the teacher.","I am a language student."],["Classroom","வகுப்பறை"  class on Monday.","I hate Monday mornings.","We start work on Monday."],["Tuesday","Martedì","mar-teh-DEE","Il martedì vado in palestra.","Il martedì ho una riunione importante.","Il martedì è il mio giorno preferito.","I go to the gym on Tuesday.","I have an important meeting on Tuesday.","Tuesday is my favourite day."],["Wednesday","Mercoledì","mehr-koh-leh-DEE","Il mercoledì esco più tardi.","Il mercoledì studio l'italiano.","Ti chiamo mercoledì.","I leave later on Wednesday.","I study Italian on Wednesdays.","I will call you on Wednesday."],["Thursday","Giovedì","joh-veh-DEE","Il giovedì è giorno di mercato.","Il giovedì vado al cinema.","Giovedì abbiamo una festa speciale.","Thursday is market day.","I go to the cinema on Thursdays.","We have a special party on Thursday."],["Friday","Venerdì","veh-nehr-DEE","Finalmente è venerdì!","Il venerdì usciamo a ballare.","Il venerdì lavoro da casa.","Finally it is Friday!","On Friday we go dancing.","I work from home on Fridays."],["Saturday","Sabato","SAH-bah-toh","Il sabato vado a fare shopping.","Il sabato mi riposo molto.","Ci vediamo sabato pomeriggio.","I go shopping on Saturday.","I rest a lot on Saturdays.","We meet on Saturday afternoon."],["Sunday","Domenica","doh-MEH-nee-kah","La domenica è il giorno della famiglia.","La domenica andiamo in chiesa.","Riposati bene domenica.","Sunday is family day.","We go to church on Sundays.","Rest well on Sunday."]],"body":[["Head","Testa","TES-tah","Ho un forte mal di testa.","Porto un cappello in testa.","Pensa sempre con la testa.","I have a bad headache.","I wear a hat on my head.","Always think with your head."],["Eye","Occhio","OK-kyoh","Ho gli occhi marroni.","Prenditi sempre cura degli occhi!","Ho aperto gli occhi e visto il sole.","I have brown eyes.","Always take care of your eyes!","I opened my eyes and saw the sun."],["Ear","Orecchio","oh-REK-kyoh","Il mio orecchio sinistro fa male.","Le tue orecchie sono molto fredde.","Metti l'auricolare nell'orecchio.","My left ear hurts.","Your ears are very cold.","Put the earphone in your ear."],["Nose","Naso","NAH-zoh","Il mio naso è molto intasato.","Il suo naso sanguina un po'.","Soffiati il naso!","My nose is very blocked.","Her nose is bleeding a little.","Blow your nose!"],["Mouth","Bocca","BOK-kah","Apri la bocca, per favore.","Stai zitto!","Ha una bocca molto grande.","Open your mouth please.","Be quiet!","He has a very big mouth."],["Hand","Mano","MAH-noh","Dammi la mano, per favore.","Lavati le mani prima di mangiare.","Le sue mani sono molto fredde.","Give me your hand please.","Wash your hands before eating.","Her hands are very cold."],["Foot","Piede","PYEH-deh","Il mio piede destro fa molto male.","Mettiti le scarpe ai piedi.","Cammina scalzo sulla spiaggia.","My right foot hurts a lot.","Put your shoes on your feet.","Walk barefoot on the beach."],["Stomach","Stomaco","STOH-mah-koh","Mi fa molto male lo stomaco.","Ho lo stomaco molto vuoto.","Lo stomaco mi brontola per la fame.","My stomach hurts a lot.","My stomach is very empty.","My stomach is growling with hunger."],["Back","Schiena","SKYEH-nah","Mi fa molto male la schiena.","Siediti dritto per la schiena.","Il medico ha visitato la mia schiena.","My back hurts a lot.","Sit straight for your back.","The doctor examined my back."],["Leg","Gamba","GAM-bah","La mia gamba fa molto male.","Si è rotta la gamba durante la partita.","Le tue gambe sono molto stanche.","My leg hurts a lot.","She broke her leg during the match.","Your legs are very tired."]],"weather":[["Sunny","Soleggiato","soh-leh-JAH-toh","Oggi c'è molto sole.","Una giornata soleggiata è perfetta.","Il sole sorge alle 6.","It is very sunny today.","A sunny day is perfect.","The sun rises at 6."],["Rain","Pioggia","PYOD-jah","Oggi piove moltissimo.","Adoro la pioggia.","Prendi un ombrello, piove.","It is raining a lot today.","I love the rain.","Take an umbrella, it is raining."],["Cloud","Nuvola","NOO-voh-lah","Oggi ci sono molte nuvole.","Una grande nuvola ha coperto il sole.","Le nuvole sono molto scure.","There are many clouds today.","A big cloud covered the sun.","The clouds are very dark."],["Wind","Vento","VEN-toh","Oggi c'è molto vento.","Il vento è molto freddo oggi.","Il vento soffia molto forte.","It is very windy today.","The wind is very cold today.","The wind is blowing very hard."],["Cold","Freddo","FRED-doh","Oggi fa così freddo!","L'acqua è molto fredda.","Ho molto freddo qui.","It is so cold today!","The water is very cold.","I am very cold here."],["Hot","Caldo","KAL-doh","Oggi fa così caldo!","L'estate è molto calda qui.","Ho molto caldo adesso.","It is so hot today!","Summer is very hot here.","I am very hot now."],["Snow","Neve","NEH-veh","Oggi nevica moltissimo.","La neve è molto bianca.","I bambini giocano nella neve.","It is snowing a lot today.","The snow is very white.","Children play in the snow."],["Storm","Temporale","tem-poh-RAH-leh","Sta arrivando un gran temporale.","Il temporale è durato tutta la notte.","Attenzione al temporale!","A big storm is coming.","The storm lasted all night.","Watch out for the storm!"]],"numbers2":[["Eleven","Undici","ON-dee-chee","Ho undici anni.","Sono le undici.","Ci sono undici giocatori.","I am eleven.","It is eleven.","There are eleven players."],["Twelve","Dodici","DOH-dee-chee","Ci sono dodici mesi.","Sono le dodici.","Ho dodici matite.","There are twelve months.","It is twelve.","I have twelve pencils."],["Twenty","Venti","VEN-tee","Ho vent'anni.","Ho comprato venti mele.","Ci sono venti sedie.","I am twenty.","I bought twenty apples.","There are twenty chairs."],["Thirty","Trenta","TREN-tah","Settembre ha trenta giorni.","Trenta persone sono venute.","Ho trenta libri.","September has thirty days.","Thirty people came.","I have thirty books."],["Forty","Quaranta","kwah-RAN-tah","Mio padre ha quarant'anni.","Quaranta alunni all'esame.","Il viaggio è durato quaranta minuti.","My father is forty.","Forty students in the exam.","The journey took forty minutes."],["Fifty","Cinquanta","cheen-KWAN-tah","Mia madre ha cinquant'anni.","Il libro costa cinquanta rupie.","Ci sono cinquanta domande.","My mother is fifty.","The book costs fifty rupees.","There are fifty questions."],["Sixty","Sessanta","ses-SAN-tah","Mio nonno ha sessant'anni.","Un minuto ha sessanta secondi.","Sessanta persone al matrimonio.","My grandfather is sixty.","A minute has sixty seconds.","Sixty people at the wedding."],["Seventy","Settanta","set-TAN-tah","Il vecchio ha settant'anni.","Il settanta percento è acqua.","Settanta studenti hanno passato.","The old man is seventy.","Seventy percent is water.","Seventy students passed."],["Eighty","Ottanta","ot-TAN-tah","La mia bisnonna ha ottant'anni.","Ottanta studenti hanno passato.","La velocità è ottanta km/h.","My great-grandmother is eighty.","Eighty students passed.","The speed is eighty km/h."],["Hundred","Cento","CHEN-toh","Ci sono cento centesimi.","Ho corso cento metri.","Cento persone al matrimonio.","There are a hundred cents.","I ran a hundred metres.","A hundred people at the wedding."]],"months":[["January","Gennaio","jen-NAI-oh","Gennaio è il primo mese.","A gennaio fa freddo.","Il mio compleanno è a gennaio.","January is the first month.","It is cold in January.","My birthday is in January."],["February","Febbraio","feb-BRA-yoh","Febbraio è il mese più corto.","San Valentino è a febbraio.","Febbraio ha ventotto giorni.","February is the shortest month.","Valentine's Day is in February.","February has twenty-eight days."],["March","Marzo","MAR-tsoh","Marzo è il terzo mese.","La primavera inizia a marzo.","Il mio esame è a marzo.","March is the third month.","Spring starts in March.","My exam is in March."],["April","Aprile","ah-PREE-leh","Aprile è il quarto mese.","Ad aprile piove molto.","Il mio compleanno è ad aprile.","April is the fourth month.","It rains a lot in April.","My birthday is in April."],["May","Maggio","MAD-joh","Maggio è il quinto mese.","I fiori sbocciano a maggio.","Ci laureiamo a maggio.","May is the fifth month.","Flowers bloom in May.","We graduate in May."],["June","Giugno","JOO-nyoh","Giugno è il sesto mese.","Le vacanze iniziano a giugno.","Il mio matrimonio è a giugno.","June is the sixth month.","Holidays start in June.","My wedding is in June."],["July","Luglio","LOOL-yoh","Luglio è il settimo mese.","A luglio fa molto caldo.","Il quattro luglio è festa.","July is the seventh month.","It is very hot in July.","The fourth of July is a holiday."],["August","Agosto","ah-GOS-toh","Agosto è l'ottavo mese.","Il quindici agosto è festa.","Ad agosto fa caldo.","August is the eighth month.","August fifteenth is a holiday.","It is hot in August."],["September","Settembre","set-TEM-breh","Settembre ha trenta giorni.","L'autunno inizia a settembre.","Torno in classe a settembre.","September has thirty days.","Autumn starts in September.","I go back to class in September."],["October","Ottobre","ot-TOH-breh","Ottobre ha trentuno giorni.","Diwali è a ottobre.","Le foglie cadono a ottobre.","October has thirty-one days.","Diwali is in October.","Leaves fall in October."],["November","Novembre","noh-VEM-breh","Novembre ha trenta giorni.","A novembre fa freddo.","Il mio compleanno è a novembre.","November has thirty days.","It is cold in November.","My birthday is in November."],["December","Dicembre","dee-CHEM-breh","Dicembre è l'ultimo mese.","Il Natale è a dicembre.","A dicembre fa molto freddo.","December is the last month.","Christmas is in December.","It is very cold in December."]],"animals":[["Dog","Cane","KAH-neh","Il cane abbaia forte.","Il mio cane si chiama Max.","Il cane è il nostro amico.","The dog barks loudly.","My dog is named Max.","The dog is our friend."],["Cat","Gatto","GAT-toh","Il gatto dorme tutto il giorno.","Il mio gatto beve latte.","Il gatto è salito sull'albero.","The cat sleeps all day.","My cat drinks milk.","The cat climbed the tree."],["Elephant","Elefante","eh-leh-FAN-teh","L'elefante è il più grande animale.","Ha una lunga proboscide.","Ho visto un elefante allo zoo.","The elephant is the largest animal.","It has a long trunk.","I saw an elephant at the zoo."],["Tiger","Tigre","TEE-greh","La tigre è un animale feroce.","È l'animale nazionale dell'India.","Ho visto una tigre nella giungla.","The tiger is a fierce animal.","It is India's national animal.","I saw a tiger in the jungle."],["Bird","Uccello","oo-CHEL-loh","L'uccello canta sull'albero.","Ho visto un uccello colorato.","L'uccello vola alto.","The bird sings in the tree.","I saw a colourful bird.","The bird flies high."],["Fish","Pesce","PEH-sheh","Il pesce nuota nel fiume.","Ho visto pesci colorati.","Il pesce fa bene alla salute.","The fish swims in the river.","I saw colourful fish.","Fish is good for health."],["Cow","Mucca","MOOK-kah","La mucca dà latte fresco.","La mucca pascola nel campo.","La mucca è sacra in India.","The cow gives fresh milk.","The cow grazes in the field.","The cow is sacred in India."],["Monkey","Scimmia","SHEEM-myah","La scimmia salta da albero ad albero.","La scimmia mangia una banana.","Le scimmie vivono nella giungla.","The monkey jumps tree to tree.","The monkey eats a banana.","Monkeys live in the jungle."],["Lion","Leone","leh-OH-neh","Il leone è il re della giungla.","Il leone ruggisce forte.","Ho visto un leone in safari.","The lion is king of the jungle.","The lion roars loudly.","I saw a lion on safari."],["Rabbit","Coniglio","koh-NEEL-yoh","Il coniglio mangia carote.","Ha le orecchie lunghe.","Il coniglio salta veloce.","The rabbit eats carrots.","It has long ears.","The rabbit jumps fast."],["Butterfly","Farfalla","far-FAL-lah","La farfalla vola di fiore in fiore.","Ha le ali colorate.","Ho visto una farfalla in giardino.","The butterfly flies flower to flower.","It has colourful wings.","I saw a butterfly in the garden."],["Horse","Cavallo","kah-VAL-loh","Il cavallo corre molto veloce.","Mangia erba nel campo.","Il cavaliere montò il cavallo.","The horse runs very fast.","It eats grass in the field.","The rider rode the horse."]],"clothing":[["Shirt","Camicia","kah-MEE-chah","Ho indossato una camicia blu.","La camicia è sporca.","Ho comprato una nuova camicia.","I put on a blue shirt.","The shirt is dirty.","I bought a new shirt."],["Pants","Pantaloni","pan-tah-LOH-nee","Ho messo i pantaloni neri.","Sono troppo lunghi.","Quei pantaloni ti stanno bene.","I put on black pants.","They are too long.","Those pants suit you well."],["Dress","Vestito","ves-TEE-toh","Lei indossa un vestito rosso.","Il vestito è molto bello.","Abbiamo comprato un vestito per le nozze.","She wears a red dress.","The dress is very beautiful.","We bought a dress for the wedding."],["Shoes","Scarpe","SCAR-peh","Ho messo le scarpe nere.","Le mie scarpe sono sporche.","Ho comprato scarpe per la scuola.","I put on black shoes.","My shoes are dirty.","I bought shoes for school."],["Hat","Cappello","kap-PEL-loh","Ho messo il cappello uscendo.","Protegge dal sole.","Ho perso il mio cappello preferito.","I put on a hat going out.","It protects from the sun.","I lost my favourite hat."],["Jacket","Giacca","JAK-kah","Metti la giacca, fa freddo.","La giacca blu è mia.","Abbiamo comprato giacche per l'inverno.","Wear a jacket, it is cold.","The blue jacket is mine.","We bought jackets for winter."],["Socks","Calzini","kahl-TSEE-nee","Ho dimenticato i calzini.","Sono bagnati.","Ho comprato calzini di lana.","I forgot to put on socks.","They are wet.","I bought wool socks."],["Umbrella","Ombrello","om-BREL-loh","Porto l'ombrello quando piove.","Protegge dalla pioggia.","Ho dimenticato l'ombrello.","I carry an umbrella when it rains.","It protects from rain.","I forgot my umbrella at the office."],["Watch","Orologio","oh-roh-LOH-joh","Porto un orologio d'oro.","Segna le tre.","Ho bisogno di un nuovo orologio.","I wear a gold watch.","It shows three o'clock.","I need a new watch."],["Bag","Borsa","BOR-sah","Porto la borsa dappertutto.","La borsa rossa è di mia madre.","Ho perso la borsa al mercato.","I carry my bag everywhere.","The red bag is my mother's.","I lost my bag at the market."],["Glasses","Occhiali","ok-KYAH-li","Ho bisogno di occhiali per leggere.","I miei occhiali si sono rotti.","Ho comprato nuovi occhiali ieri.","I need glasses to read.","My glasses broke.","I bought new glasses yesterday."]],"transport":[["Car","Macchina","MAK-kee-nah","La macchina è rossa e nuova.","Sono andato al mercato.","Ha bisogno di carburante.","The car is red and new.","I went to market by car.","It needs fuel."],["Bus","Autobus","OW-toh-boos","Prendo l'autobus per la scuola.","L'autobus è arrivato tardi.","Ce n'è uno ogni dieci minuti.","I take the bus to school.","The bus arrived late.","There is one every ten minutes."],["Train","Treno","TREH-noh","Viaggio in treno a Mumbai.","Il treno va molto veloce.","La stazione è lontana.","I travel by train to Mumbai.","The train goes very fast.","The station is far away."],["Airplane","Aereo","ah-EH-reo","Abbiamo viaggiato in aereo.","L'aereo è decollato in orario.","Il volo è durato tre ore.","We travelled by plane to London.","The plane took off on time.","The flight lasted three hours."],["Bicycle","Bicicletta","bee-chee-KLET-tah","Vado al parco in bicicletta.","Fa bene alla salute.","Mi hanno regalato una bici.","I go to the park by bicycle.","Cycling is good for health.","I was gifted a bicycle."],["Ship","Nave","NAH-veh","La nave naviga sul mare.","Ho visto una nave al porto.","Il viaggio è durato due giorni.","The ship sails across the sea.","I saw a ship at the port.","The journey lasted two days."],["Motorcycle","Moto","MOH-toh","Mio padre ha una moto rossa.","Va molto veloce.","Indossa sempre il casco.","My father has a red motorcycle.","It goes very fast.","Always wear a helmet."],["Taxi","Taxi","TAK-si","Ho chiamato un taxi per l'aeroporto.","È arrivato in cinque minuti.","Era veloce e comodo.","I called a taxi for the airport.","It arrived in five minutes.","It was fast and comfortable."],["Auto Rickshaw","Risciò","REE-shaw","Ho preso un risciò al mercato.","È economico e pratico.","Il guidatore era gentile.","I took a rickshaw to the market.","It is cheap and practical.","The driver was kind."],["Boat","Barca","BAR-kah","Sono andato al lago in barca.","Si muoveva col vento.","Ci siamo goduti il giro.","I went by boat to the lake.","It moved with the wind.","We enjoyed the boat ride."],["Metro","Metro","MEH-troh","Ho preso la metro.","È veloce.","La stazione è vicina.","I took the metro to the centre.","It is fast in the city.","The station is nearby."]],"emotions":[["Happy","Felice","feh-LEE-cheh","Sono molto felice oggi.","Mi sento felice.","La musica mi rende felice.","I am very happy today.","I feel happy.","Music makes me happy."],["Sad","Triste","TREES-teh","Mi sento triste oggi.","Il bambino piange perché è triste.","La notizia mi ha rattristato.","I feel sad today.","The child cries because it is sad.","I became sad with the news."],["Angry","Arrabbiato","ar-rab-BYAH-toh","Sono arrabbiato con te.","Non arrabbiarti.","Il professore era arrabbiato.","I am angry with you.","Do not get angry about that.","The teacher was angry."],["Scared","Spaventato","spa-ven-TAH-toh","Il bambino ha paura del tuono.","Mi sono spaventato vedendo il ragno.","Non aver paura del buio.","The child is scared of thunder.","I got scared seeing the spider.","Do not be afraid of the dark."],["Surprised","Sorpreso","sor-PREH-zoh","Sono molto sorpreso.","Mi hanno sorpreso con un regalo.","La notizia mi ha sorpreso.","I am very surprised.","They surprised me with a gift.","The news surprised me."],["Excited","Emozionato","eh-mo-tsyo-NAH-toh","Sono emozionato per il viaggio.","I bambini sono emozionati.","Mi sento molto emozionato.","I am excited about the trip.","The children are excited.","I feel very excited today."],["Tired","Stanco","STAN-koh","Sono molto stanco dopo il lavoro.","Il bambino è stanco dopo il gioco.","Dormo bene quando sono stanco.","I am very tired after work.","The child is tired after playing.","I sleep well when tired."],["Proud","Orgoglioso","or-gol-YOH-zoh","Sono orgoglioso di te.","Mi sento orgoglioso.","I genitori sono orgogliosi.","I am proud of you.","I feel proud of my work.","The parents are proud."],["Bored","Annoiato","an-noy-AH-toh","Mi annoio a casa.","Il bambino si annoia senza amici.","Mi annoio quando non c'è niente.","I am bored at home.","The child gets bored without friends.","I get bored when there is nothing to do."],["Nervous","Nervoso","ner-VOH-zoh","Sono nervoso prima dell'esame.","Mi innervosisco quando parlo.","È normale sentirsi nervosi.","I am nervous before the exam.","I get nervous speaking in public.","It is normal to feel nervous."]],"opposites":[["Big / Small","Grande / Piccolo","GRAN-deh/PIK-koh-loh","L'elefante è grande, il topo è piccolo.","Questa casa è molto grande.","La mia borsa è piccola ma utile.","The elephant is big, the mouse is small.","This house is very big.","My bag is small but useful."],["Fast / Slow","Veloce / Lento","veh-LOH-cheh/LEN-toh","La macchina è veloce, la tartaruga lenta.","Cammina più veloce o arriverai tardi.","Il treno lento è arrivato in ritardo.","The car is fast, the turtle is slow.","Walk faster or you will be late.","The slow train arrived late."],["Hot / Cold","Caldo / Freddo","KAL-doh/FRED-doh","Il caffè è caldo e l'acqua fredda.","Quest'estate è molto calda.","L'inverno è freddo qui.","The coffee is hot and the water cold.","This summer is very hot.","Winter is cold here."],["New / Old","Nuovo / Vecchio","NWOH-voh/VEK-kyoh","Ho comprato un telefono nuovo.","Il vecchio edificio è stato demolito.","Preferisco i libri nuovi.","I bought a new phone.","The old building was demolished.","I prefer new books to old ones."],["Good / Bad","Buono / Cattivo","BWOH-noh/kat-TEE-voh","Questo è un buon libro.","Il cibo cattivo fa ammalare.","Oggi è stata una buona giornata.","This is a good book.","Bad food makes you sick.","Today was a good day."],["Day / Night","Giorno / Notte","JOR-noh/NOT-teh","Il giorno è luminoso, la notte buia.","Lavoro di giorno e riposo di notte.","Il cielo è blu di giorno.","The day is bright, the night is dark.","I work by day and rest at night.","The sky is blue by day."],["Up / Down","Su / Giù","soo/joo","L'aereo vola sopra le nuvole.","Il prezzo del petrolio è sceso.","Sali su e porta giù la scatola.","The plane flies above the clouds.","The price of oil went down.","Go up and bring the box down."],["Open / Closed","Aperto / Chiuso","ah-PAIR-toh/KYOO-zoh","Il negozio è aperto oggi.","La porta è chiusa a chiave.","La banca è aperta da lunedì a venerdì.","The shop is open today.","The door is locked closed.","The bank is open Monday to Friday."],["Love / Hate","Amore / Odio","ah-MOH-reh/OH-dyoh","L'amore rende il mondo migliore.","Non odiare nessuno.","Sento amore per la mia famiglia.","Love makes the world better.","Do not hate anyone.","I feel love for my family."],["Win / Lose","Vincere / Perdere","VEEN-cheh-reh/PAIR-deh-reh","Voglio vincere.","Non mi piace perdere.","Abbiamo vinto oggi.","I want to win the competition.","I do not like to lose.","We won the match today."]],"school":[["Teacher","Insegnante","in-seh-NYAN-teh","L'insegnante spiega la lezione.","Il mio insegnante è molto paziente.","L'insegnante è arrivato presto.","The teacher explains the lesson.","My teacher is very patient.","The teacher arrived early today."],["Student","Studente","stoo-DEN-teh","Lo studente studia molto.","Gli studenti ascoltano l'insegnante.","Sono uno studente di lingue.","The student studies a lot.","Students listen to the teacher.","I am a language student."],["Classroom","Aula","OW-lah","L'aula è grande.","Ci sono trenta alunni in aula.","Abbiamo decorato l'aula oggi.","The classroom is large.","There are thirty students in the classroom.","We decorated the classroom today."],["Book","Libro","LEE-broh","Il libro è molto interessante.","Leggo un libro ogni settimana.","Ho dimenticato il libro a casa.","The book is very interesting.","I read a book every week.","I forgot my book at home."],["Pencil","Matita","mah-TEE-tah","La matita è gialla.","Ho perso la matita in classe.","Ho bisogno di una matita per scrivere.","The pencil is yellow.","I lost my pencil in class.","I need a pencil to write."],["Pen","Penna","PEN-nah","La penna è blu.","Prestami la tua penna per favore.","Ho scritto una lettera con la mia penna.","The pen is blue.","Please lend me your pen.","I wrote a letter with my pen."],["Bag/Backpack","Zaino","TSAI-noh","Il mio zaino è pieno di libri.","Ho messo lo zaino sulla sedia.","Ho bisogno di un nuovo zaino.","My backpack is full of books.","I put my backpack on the chair.","I need a new backpack."],["Homework","Compiti","kom-PEE-tee","Ho finito i compiti presto.","L'insegnante ha controllato i miei compiti.","Ho molti compiti questa settimana.","I finished my homework early.","The teacher checked my homework.","I have a lot of homework this week."],["Exam","Esame","eh-ZAH-meh","Ho un esame domani.","Ho studiato molto per l'esame.","Ho superato l'esame con un buon voto.","I have an exam tomorrow.","I studied a lot for the exam.","I passed the exam with a good grade."],["School","Scuola","SKWOH-lah","Vado a scuola tutti i giorni.","La mia scuola ha un grande giardino.","La scuola finisce alle tre.","I go to school every day.","My school has a big garden.","School ends at three o'clock."],["Principal","Preside","preh-ZEE-deh","Il preside parla con i genitori.","Il preside è molto severo.","Il preside è gentile.","The principal talks with parents.","The principal is very strict.","The principal is kind."],["Uniform","Uniforme","oo-nee-FOR-meh","Indosso la divisa a scuola.","La divisa è blu e bianca.","Ho messo la divisa la mattina.","I wear a uniform to school.","The uniform is blue and white.","I put on my uniform in the morning."]],"home":[["Kitchen","Cucina","koo-CHEE-nah","La cucina profuma bene.","La mamma cucina in cucina.","Abbia
