 molto ripide.","Sono salito di corsa.","Le scale portano al secondo piano.","The stairs are very steep.","I ran up the stairs.","The stairs lead to the second floor."]]},"ja":{"greetings":[["Hello","こんにちは","Kon-ni-chi-wa","こんにちは、お元気ですか？","こんにちは！久しぶりですね。","こんにちは！大丈夫ですか？","Hello, how are you?","Hello! Long time no see.","Hello! Are you okay?"],["Good morning","おはようございます","O-ha-yo go-zai-mas","おはようございます、田中さん！","おはようございます、よく眠れましたか？","みなさん、おはようございます！","Good morning Mr Tanaka!","Good morning, did you sleep well?","Good morning to everyone!"],["Good night","おやすみなさい","O-ya-su-mi na-sai","おやすみなさい、また明日。","おやすみなさい、よく眠ってください！","家族のみんなにおやすみなさい。","Good night, see you tomorrow.","Good night, sleep well!","Good night to the whole family."],["Thank you","ありがとうございます","A-ri-ga-to go-zai-mas","助けてくれてありがとうございます。","どうもありがとうございます、とても親切ですね。","心からありがとうございます。","Thank you for helping me.","Thank you very much, you are very kind.","Thank you from the heart."],["Please","お願いします","O-ne-gai shi-mas","コーヒーをお願いします。","お願いします、助けてください。","ゆっくり話してください、お願いします。","A coffee please.","Please help me.","Please speak slowly."],["Excuse me","すみません","Su-mi-ma-sen","すみません、トイレはどこですか？","遅れてすみません。","すみません！気づきませんでした。","Excuse me, where is the bathroom?","Sorry for being late.","Excuse me! I did not notice you."],["Yes","はい","hai","はい、わかります。","はい、ぜひお願いします。","はい！その通りです。","Yes, I understand.","Yes, I would very much like that.","Yes! That is correct."],["No","いいえ","i-i-e","いいえ、結構です。","わかりません。","いいえ、それは正しくありません。","No, thank you.","I don't know.","No, that is not correct."],["How are you?","お元気ですか？","O-gen-ki des-ka","今日はお元気ですか？","旅行の後はいかがですか？","久しぶり！お元気ですか？","How are you today?","How are you after the trip?","Long time no see! How are you?"],["See you later","またあとで","Ma-ta a-to-de","またあとで、またね！","またあとで、お気をつけて。","またあとで、良い旅を。","See you later!","See you later, take care.","See you later and have a good trip."],["You're welcome","どういたしまして","Do-i-ta-shi-mas-te","どういたしまして、喜んで。","どういたしまして！そのために来ています。","どういたしまして、いつでも。","You're welcome, with pleasure.","You're welcome, that is what I am here for.","You're welcome, anytime."],["I'm sorry","申し訳ありません","Mo-shi-wa-ke a-ri-ma-sen","本当に申し訳ありません。","申し訳ありません、私のせいです。","起きたことに申し訳ありません。","I am truly sorry.","I am sorry, it was my fault.","I am sorry for what happened."]],"food":[["Water","水","mi-zu","水をください、お願いします。","水はとても冷たいです。","もっと水をもらえますか？","Water please.","The water is very cold.","Can I have more water?"],["Bread","パン","pan","このパンはとてもおいしいです。","バターつきのパンが好きです。","パンはまだありますか？","This bread is very delicious.","I like bread with butter.","Is there any bread left?"],["Coffee","コーヒー","ko-hi","ブラックコーヒーが好きです。","ミルクコーヒーをお願いします。","ここのコーヒーは素晴らしいです。","I like black coffee.","A coffee with milk please.","The coffee here is excellent."],["Rice","ご飯","go-han","このご飯はとてもおいしいです。","豆ご飯が食べたいです。","もっとご飯はありますか？","This rice is very delicious.","I want rice with beans.","Is there more rice?"],["Milk","牛乳","gyu-nyu","牛乳を一杯お願いします。","牛乳は冷たいです。","市場で牛乳を買ってください。","A glass of milk please.","The milk is cold.","Please buy milk at the market."],["Egg","卵","ta-ma-go","目玉焼きを二つお願いします。","この卵はとてもおいしいです。","家に卵はありますか？","Two fried eggs please.","This egg is very tasty.","Do you have eggs at home?"],["Chicken","鶏肉","to-ri-ni-ku","鶏肉はとてもおいしいです。","焼き鶏が食べたいです。","鶏肉はどうやって調理しますか？","The chicken is very delicious.","I want grilled chicken.","How do you cook the chicken?"],["Fish","魚","sa-ka-na","この魚はとても新鮮です。","焼き魚が大好きです。","今日は魚がありますか？","This fish is very fresh.","I love grilled fish.","Is there fish today?"],["Fruit","果物","ku-da-mo-no","この果物はとても新鮮です。","毎日もっと果物を食べてください。","どんな果物がありますか？","This fruit is very fresh.","Please eat more fruit every day.","What fruit do you have?"],["Vegetables","野菜","ya-sai","野菜はとても健康的です。","今日はもっと野菜を食べてください。","どんな野菜がありますか？","Vegetables are very healthy.","Please eat more vegetables today.","What vegetables do you have?"],["I am hungry","お腹が空きました","O-na-ka ga su-ki-mas-ta","今とてもお腹が空きました。","お腹が空きました！食べましょうか？","私はいつも12時にお腹が空きます。","I am very hungry now.","I am hungry! Shall uros please.","I count to ten.","There are ten people here."]],"daily":[["House","家","ie","私の家は大きくて美しいです。","昨夜は遅く家に帰りました。","あなたの家はどこですか？","My house is big and beautiful.","I got home late last night.","Where is your house?"],["Family","家族","ka-zo-ku","家族は一番大切なものです。","今日は家族全員が集まりました。","ご家族はいかがですか？","Family is most important.","The whole family got together today.","How is your family?"],["Work","仕事","shi-go-to","バスで仕事に行きます。","今日は仕事が大変でした。","私は仕事が好きです。","I go to work by bus.","Work was hard today.","I like my work."],["School","学校","gak-ko","子供たちは学校に行きます。","学校は8時に始まります。","学校は好きですか？","The children go to school.","School starts at 8.","Do you like school?"],["Money","お金","o-ka-ne","お金が十分にありません。","いくらお金が必要ですか？","お金がすべてではありません。","I don't have enough money.","How much money do you need?","Money is not everything."],["Time","時間","ji-kan","今は時間がありません。","時間はとても速く過ぎます。","今何時ですか？","I don't have time now.","Time passes very fast.","What time is it now?"],["Today","今日","kyo","今日は完璧な日です。","今日は何をしますか？","今日は授業がありません。","Today is a perfect day.","What shall we do today?","I have no class today."],["Tomorrow","明日","a-shi-ta","明日は会議があります。","また明日！","明日は必ずやります。","I have a meeting tomorrow.","See you tomorrow!","I will definitely do it tomorrow."],["Yesterday","昨日","ki-no","昨日は市場に行きました。","昨日は何をしましたか？","昨日はたくさん雨が降りました。","I went to the market yesterday.","What did you do yesterday?","It rained a lot yesterday."],["Friend","友達","to-mo-da-chi","彼は私の一番の友達です。","今日は友達を訪ねました。","友達は何人いますか？","He is my best friend.","I visited a friend today.","How many friends do you have?"],["Doctor","医者","i-sha","医者に診てもらう必要があります。","医者はすぐ来ます。","医者は私が元気だと言いました。","I need to see a doctor.","The doctor will come soon.","The doctor said I am well."],["Hospital","病院","byo-in","病院はとても近いです。","昨日病院に行きました。","病院はどこですか？","The hospital is very close.","I went to the hospital yesterday.","Where is the hospital?"],["Market","市場","i-chi-ba","毎週日曜日に市場に行きます。","市場で何を買いましたか？","市場は7時に開きます。","I go to the market every Sunday.","What did ","お母さん","o-ka-a-san","お母さんはとても料理が上手です。","お母さんに電話してください。","お母さんはいつも私たちの世話をします。","My mother cooks very well.","Call your mother.","Mother always takes care of us."],["Father","お父さん","o-to-o-san","お父さんはとても一生懸命働きます。","お父さんは遅く帰宅しました。","お父さんがとても好きです。","My father works very hard.","Father came home late.","I love my father very much."],["Brother","お兄さん","o-ni-i-san","私の兄は医学を勉強しています。","毎日兄と遊びます。","兄弟はいますか？","My older brother studies medicine.","I play with my brother every day.","Do you have siblings?"],["Sister","お姉さん","o-ne-e-san","私の姉はとても頭が良いです。","姉は東京に住んでいます。","私には姉が二人います。","My older sister is very clever.","My sister lives in Tokyo.","I have two sisters."],["Son","息子","mu-su-ko","私の息子は5歳です。","長男はもうすぐ結婚します。","息子を誇りに思います。","My son is 5 years old.","The eldest son is getting married soon.","I am proud of my son."],["Daughter","娘","mu-su-me","私の娘はダンスを習っています。","一番下の娘はとても活発です。","娘がとても好きです。","My daughter is learning to dance.","The youngest daughter is very lively.","I love my daughter very much."],["Grandfather","おじいさん","o-ji-i-san","祖父は80歳です。","おじいさんはいつも話してくれます。","日曜日に祖父を訪ねます。","My grandfather is 80 years old.","Grandfather always tells stories.","I visit grandfather on Sundays."],["Grandmother","おばあさん","o-baa-san","祖母はおいしいケーキを作ります。","祖母は田舎に住んでいます。","おばあさんはとても甘やかしてくれます。","Grandma makes delicious cakes.","My grandma lives in the countryside.","Grandma spoils us a lot."],["Uncle","おじさん","o-ji-san","私のおじは大阪に住んでいます。","おじが贈り物を持ってきてくれました。","週末におじを訪ねます。","My uncle lives in Osaka.","Uncle brought us gifts.","We visit uncle at the weekend."],["Aunt","おばさん","o-ba-san","私のおばはとても優しいです。","おばがパーティーを準備してくれました。","おばは病院で働いています。","My aunt is very kind.","Aunt prepared a party for us.","My aunt works in a hospital."]],"days":[["Monday","月曜日","ge-tsu-yo-bi","月曜日は授業があります。","月曜日の朝は嫌いです。","月曜日から仕事が始まります。","I have class on Monday.","I hate Monday mornings.","Work starts on Monday."],["Tuesday","火曜日","ka-yo-bi","火曜日はジムに行きます。","火曜日は大切な会議があります。","火曜日は私の好きな日です。","I go to the gym on Tuesday.","I have です。","お腹がとても空いています。","お腹がグーグーなっています。","My stomach hurts a lot.","My stomach is very empty.","My stomach is growling."],["Back","背中","se-na-ka","背中がひどく痛いです。","背中のために姿勢を正して座ってください。","医者が背中を診てくれました。","My back hurts a lot.","Sit straight for your back.","The doctor checked my back."],["Leg","脚","a-shi","脚がひどく痛いです。","試合中に脚を骨折しました。","あなたの脚はとても疲れています。","My leg hurts a lot.","She broke her leg in the match.","Your legs are very tired."]],"weather":[["Sunny","晴れ","ha-re","今日はとても晴れています。","晴れた日は最高です。","太陽は6時に昇ります。","It is very sunny today.","A sunny day is perfect.","The sun rises at 6."],["Rain","雨","a-me","今日はとても雨が降っています。","私は雨がとても好きです。","傘を持っていってください、雨が降っています。","It is raining a lot today.","I love the rain.","Take an umbrella, it is raining."],["Cloud","雲","ku-mo","今日はたくさん雲があります。","大きな雲が太陽を隠しました。","雲はとても暗いです。","There are many clouds today.","A big cloud covered the sun.","The clouds are very dark."],["Wind","風","ka-ze","今日はとても風が強いです。","今日の風はとても冷たいです。","風がとても強く吹いています。","It is very windy today.","The wind is very cold today.","The wind is blowing very hard."],["Cold","寒い","sa-mu-i","今日はとても寒いです！","水はとても冷たいです。","ここはとても寒いです。","It is so cold today!","The water is very cold.","It is very cold here."],["Hot","暑い","a-tsu-i","今日はとても暑いです！","ここの夏はとても暑いです。","今はとても暑いです。","It is so hot today!","Summer is very hot here.","I am very hot now."],["Snow","雪","yu-ki","今日はとても雪が降っています。","雪はとても白いです。","子供たちは雪で遊んでいます。","It is snowing a lot today.","The snow is very white.","Children are playing in the snow."],["Storm","嵐","a-ra-shi","大きな嵐が来ています。","嵐は一晩中続きました。","嵐に気をつけてください！","A big storm is coming.","The storm lasted all night.","Be careful of the storm!"]],"numbers2":[["Eleven","十一","juu-ichi","私は十一歳です。","十一時です。","十一人います。","I am eleven.","It is eleven.","There are eleven."],["Twelve","十二","juu-ni","一年に十二ヶ月あります。","十二時です。","鉛筆が十二本あります。","There are twelve months.","It is twelve.","I have twelve pencils."],["Twenty","二十","ni-juu","私は二十歳です。","りんごを二十個買いました。","椅子が二十脚あります。","I am twenty.","I bought twenty art in June.","My wedding is in June."],["July","七月","shi-chi-ga-tsu","七月は七番目の月です。","七月はとても暑いです。","七月四日は祝日です。","July is the seventh month.","It is very hot in July.","The fourth of July is a holiday."],["August","八月","ha-chi-ga-tsu","八月は八番目の月です。","八月十五日はインドの独立記念日です。","八月はとても暑いです。","August is the eighth month.","August fifteenth is Independence Day.","It is very hot in August."],["September","九月","ku-ga-tsu","九月は三十日あります。","秋は九月から始まります。","九月に学校が始まります。","September has thirty days.","Autumn starts in September.","School starts in September."],["October","十月","juu-ga-tsu","十月は三十一日あります。","十月はディワリです。","十月に葉が落ちます。","October has thirty-one days.","Diwali is in October.","Leaves fall in October."],["November","十一月","juu-ichi-ga-tsu","十一月は三十日あります。","十一月は寒いです。","私の誕生日は十一月です。","November has thirty days.","It is cold in November.","My birthday is in November."],["December","十二月","juu-ni-ga-tsu","十二月は最後の月です。","クリスマスは十二月です。","十二月はとても寒いです。","December is the last month.","Christmas is in December.","It is very cold in December."]],"animals":[["Dog","犬","inu","犬が大きく吠えます。","私の犬の名前はマックスです。","犬は私たちの友達です。","The dog barks loudly.","My dog is named Max.","The dog is our friend."],["Cat","猫","neko","猫は一日中眠っています。","私の猫はミルクを飲みます。","猫が木に登りました。","The cat sleeps all day.","My cat drinks milk.","The cat climbed the tree."],["Elephant","象","zou","象は最も大きな動物です。","長い鼻を持っています。","動物園で象を見ました。","The elephant is the largest animal.","It has a long trunk.","I saw an elephant at the zoo."],["Tiger","虎","tora","虎は恐ろしい動物です。","インドの国の動物です。","ジャングルで虎を見ました。","The tiger is a fierce animal.","It is India's national animal.","I saw a tiger in the jungle."],["Bird","鳥","tori","鳥が木で歌っています。","カラフルな鳥を見ました。","鳥が空高く飛んでいます。","The bird sings in the tree.","I saw a colourful bird.","The bird flies high."],["Fish","魚","sakana","魚が川で泳いでいます。","カラフルな魚を見ました。","魚は健康に良いです。","The fish swims in the river.","I saw colourful fish.","Fish is good for health."],["Cow","牛","ushi","牛は新鮮なミルクを出します。","牛が草を食べています。","インドで牛は神聖です。","The cow gives when it rains.","It protects from rain.","I forgot my umbrella at the office."],["Watch","時計","tokei","金の時計をしています。","三時を指しています。","新しい時計が必要です。","I wear a gold watch.","It shows three o'clock.","I need a new watch."],["Bag","バッグ","bag-gu","どこへでもバッグを持ちます。","赤いバッグは母のものです。","市場でバッグを失くしました。","I carry my bag everywhere.","The red bag is my mother's.","I lost my bag at the market."],["Glasses","眼鏡","me-gane","読むのに眼鏡が必要です。","眼鏡が壊れました。","昨日新しい眼鏡を買いました。","I need glasses to read.","My glasses broke.","I bought new glasses yesterday."]],"transport":[["Car","車","kuruma","車は赤くて新しいです。","車でスーパーに行きました。","燃料が必要です。","The car is red and new.","I went to market by car.","It needs fuel."],["Bus","バス","basu","学校へバスで行きます。","バスが遅れました。","十分ごとにバスがあります。","I take the bus to school.","The bus arrived late.","There is one every ten minutes."],["Train","電車","den-sha","電車でムンバイへ行きます。","電車はとても速い。","駅は遠いです。","I travel by train to Mumbai.","The train goes very fast.","The station is far away."],["Airplane","飛行機","hiko-ki","飛行機でロンドンへ行きました。","時間通りに出発しました。","三時間かかりました。","We travelled by plane to London.","The plane took off on time.","The flight lasted three hours."],["Bicycle","自転車","ji-ten-sha","自転車で公園に行きます。","健康に良いです。","新しい自転車をもらいました。","I go to the park by bicycle.","Cycling is good for health.","I was gifted a bicycle."],["Ship","船","fune","船が海を航行しています。","港で船を見ました。","二日間かかりました。","The ship sails across the sea.","I saw a ship at the port.","The journey lasted two days."],["Motorcycle","バイク","bai-ku","父は赤いバイクを持っています。","とても速いです。","常にヘルメットを着けてください。","My father has a red motorcycle.","It goes very fast.","Always wear a helmet."],["Taxi","タクシー","ta-ku-shi","空港のためにタクシーを呼びました。","五分で来ました。","速くて快適でした。","I called a taxi for the airport.","It arrived in five minutes.","It was fast and comfortable."],["Auto Rickshaw","オートリキシャ","o-to-ri-ki-sha","市場へオートリキシャに乗りました。","安くて便利です。","運転手は親切でした。","I took a rickshaw to the market.","It is cheap and practical.","The driver was kind."],["Boat","ボート","bo-to","湖へボートで行きました。","風で動いていました。","ボートに乗るのを楽しみました。","I went by boat to the lake.","It moved with the wind.","We enjoyed the boat ride."],["Metro","地下鉄","chi-ka-tetsu","地下鉄で行きました。","速いです。","駅が近くにあります。","I took the metro to the centre.","It is fast in the city.","The station is nearby."]],"emotions":[["Happy","嬉しい","u-re-shi-i","今日はとても嬉しいです。","嬉しい気持ちです。","音楽が嬉しくします。","I am very happy today.","I feel happy.","Music makes me happy."],["Sad","悲しい","kana-shi-i","今日は悲しいです。","子供が悲しくて泣いています。","そのニュースに悲しくなりました。","I feel sad today.","The child cries because it is sad.","I became sad with the news."],["Angry","怒っている","oko-tte-iru","あなたに腹が立っています。","怒らないでください。","先生は怒っていました。","I am angry with you.","Do not get angry about that.","The teacher was angry."],["Scared","怖い","ko-wa-i","子供は雷が怖いです。","クモを見て怖くなりました。","暗闇を怖がらないでください。","The child is scared of thunder.","I got scared seeing the spider.","Do not be afraid of the dark."],["Surprised","驚いた","odo-ro-i-ta","とても驚いています。","プレゼントで驚かせてくれました。","ニュースに驚きました。","I am very surprised.","They surprised me with a gift.","The news surprised me."],["Excited","わくわく","waku-waku","旅行でわくわくしています。","子供たちはわくわく。","とてもわくわくしています。","I am excited about the trip.","The children are excited.","I feel very excited today."],["Tired","疲れた","tsuka-re-ta","仕事の後とても疲れました。","遊んだ後子供は疲れています。","疲れた時はよく眠れます。","I am very tired after work.","The child is tired after playing.","I sleep well when tired."],["Proud","誇りに思う","hokori-ni-omou","あなたのことを誇りに思います。","自分の仕事を誇りに思います。","両親は誇りに思っています。","I am proud of you.","I feel proud of my work.","The parents are proud."],["Bored","退屈","tai-ku-tsu","家で退屈しています。","友達がいないと子供は退屈します。","何もすることがないと退屈します。","I am bored at home.","The child gets bored without friends.","I get bored when there is nothing to do."],["Nervous","緊張している","kin-cho-shi-te-iru","試験前は緊張しています。","人前で話すと緊張します。","緊張するのは普通です。","I am nervous before the exam.","I get nervous speaking in public.","It is normal to feel nervous."]],"opposites":[["Big / Small","大きい / 小さい","okii/chisai","象は大きくてネズミは小さいです。","この家は ್ಮ ತುಂಬಾ ಪ್ರೀತಿಯಿಂದ ಇರುತ್ತಾರೆ.","ಚಿಕ್ಕಮ್ಮ ನಮಗಾಗಿ ಔತಣ ಮಾಡಿದರು.","ಚಿಕ್ಕಮ್ಮ ಆಸ್ಪತ್ರೆಯಲ್ಲಿ ಕೆಲಸ ಮಾಡುತ್ತಾರೆ.","My aunt is very loving.","Aunt made a feast for us.","My aunt works in a hospital."]],"days":[["Monday","ಸೋಮವಾರ","So-ma-vaa-ra","ಸೋಮವಾರ ತರಗತಿ ಇದೆ.","ಸೋಮವಾರ ಬೆಳಿಗ್ಗೆ ಸಭೆ.","ಸೋಮವಾರ ಕೆಲಸ ಶುರು.","I have class on Monday.","Meeting on Monday morning.","Work starts on Monday."],["Tuesday","ಮಂಗಳವಾರ","Man-ga-la-vaa-ra","ಮಂಗಳವಾರ ಜಿಮ್‌ಗೆ ಹೋಗುತ್ತೇನೆ.","ಮಂಗಳವಾರ ಮುಖ್ಯ ಸಭೆ ಇದೆ.","ಮಂಗಳವಾರ ನನ್ನ ಅಚ್ಚುಮೆಚ್ಚಿನ ದಿನ.","I go to the gym on Tuesday.","I have an important meeting on Tuesday.","Tuesday is my favourite day."],["Wednesday","ಬುಧವಾರ","Bu-dha-vaa-ra","ಬುಧವಾರ ತಡವಾಗಿ ಹೋಗುತ್ತೇನೆ.","ಬುಧವಾರ ಕನ್ನಡ ಓದುತ್ತೇನೆ.","ಬುಧವಾರ ಫೋನ್ ಮಾಡುತ್ತೇನೆ.","I leave late on Wednesday.","I study Kannada on Wednesday.","I will call on Wednesday."],["Thursday","ಗುರುವಾರ","Gu-ru-vaa-ra","ಗುರುವಾರ ಮಾರುಕಟ್ಟೆ ದಿನ.","ಗುರುವಾರ ದೇವಸ್ಥಾನಕ್ಕೆ ಹೋಗುತ್ತೇವೆ.","ಗುರುವಾರ ವಿಶೇಷ ಸಂಭ್ರಮ.","Thursday is market day.","We go to the temple on Thursday.","Special celebration on Thursday."],["Friday","ಶುಕ್ರವಾರ","Shuk-ra-vaa-ra","ಅಂತೂ ಶುಕ್ರವಾರ ಬಂತು!","ಶುಕ್ರವಾರ ಶಾಪಿಂಗ್ ಹೋಗೋಣ.","ಶುಕ್ರವಾರ ಚಲನಚಿತ್ರ ನೋಡೋಣ.","Finally Friday is here!","Let us go shopping on Friday.","Let us watch a movie on Friday."],["Saturday","ಶನಿವಾರ","Sha-ni-vaa-ra","ಶನಿವಾರ ಖರೀದಿ ಮಾಡಲು ಹೋಗುತ್ತೇನೆ.","ಶನಿವಾರ ತುಂಬಾ ವಿಶ್ರಾಂತಿ ತೆಗೆದುಕೊಳ್ಳುತ್ತೇನೆ.","ಶನಿವಾರ ಸಂಜೆ ಭೇಟಿ ಆಗೋಣ.","I go shopping on Saturday.","I rest a lot on Saturday.","We meet on Saturday evening."],["Sunday","ಭಾನುವಾರ","Bhaa-nu-vaa-ra","ಭಾನುವಾರ ಕುಟುಂಬ ದಿನ.","ಭಾನುವಾರ ದೇವಸ್ಥಾನಕ್ಕೆ ಹೋಗುತ್ತೇವೆ.","ಭಾನುವಾರ ಚೆನ್ನಾಗಿ ವಿಶ್ರಾಂತಿ.","Sunday is family day.","We go to the temple on Sunday.","Rest well on Sunday."]],"body":[["Head","ತಲೆ","Ta-le","ನನ್ನ ತಲೆ ತುಂಬಾ ನೋಯುತ್ತಿದೆ.","ತಲೆಯ ಮೇಲೆ ಟೋಪಿ ಧರಿಸಿದ್ದೇನೆ.","ಯಾವಾಗಲೂ ತಲೆಯಿಂದ ಯೋಚಿಸಿ.","My head is hurting a lot.","I am wearing a hat on my head.","Always think with your head."],["Eye","ಕಣ್ಣು","Kan-nu","ನನ್ನ ಕಣ್ಣುಗಳು ಕಂದು ಬಣ್ಣ.","ಯಾವಾಗಲೂ ಕಣ್ಣುಗಳನ್ನು ಕಾಳಜಿ ಮಾಡಿ!","ಕಣ್ಣು ತೆರೆದಾಗ ಸೂರ್ಯ ಕಂಡ.","My ","I am angry with you.","Do not get angry about that.","The teacher was angry."],["Scared","ಭಯ","Bha-ya","ಮಗು ಗುಡುಗಿಗೆ ಭಯ.","ಜೇಡ ನೋಡಿ ಭಯ.","ಕತ್ತಲೆಗೆ ಭಯ ಬೇಡ.","The child is scared of thunder.","I got scared seeing the spider.","Do not be afraid of the dark."],["Surprised","ಆಶ್ಚರ್ಯ","Ash-char-ya","ತುಂಬಾ ಆಶ್ಚರ್ಯ.","ಉಡುಗೊರೆ ಕೊಟ್ಟು ಆಶ್ಚರ್ಯ.","ಸುದ್ದಿ ಕೇಳಿ ಆಶ್ಚರ್ಯ.","I am very surprised.","They surprised me with a gift.","The news surprised me."],["Excited","ಉತ್ಸಾಹ","Ut-saa-ha","ಪ್ರಯಾಣಕ್ಕೆ ಉತ್ಸಾಹ.","ಮಕ್ಕಳು ಉತ್ಸಾಹ.","ಇಂದು ತುಂಬಾ ಉತ್ಸಾಹ.","I am excited about the trip.","The children are excited.","I feel very excited today."],["Tired","ದಣಿವು","Da-ni-vu","ಕೆಲಸದ ನಂತರ ದಣಿವು.","ಆಟ ಆಡಿದ ನಂತರ ದಣಿವು.","ದಣಿದಾಗ ನಿದ್ದೆ ಬರುತ್ತದೆ.","I am very tired after work.","The child is tired after playing.","I sleep well when tired."],["Proud","ಹೆಮ್ಮೆ","Hem-me","ನಿನ್ನ ಬಗ್ಗೆ ಹೆಮ್ಮೆ.","ನನ್ನ ಕೆಲಸದ ಬಗ್ಗೆ ಹೆಮ್ಮೆ.","ಮಕ್ಕಳ ಬಗ್ಗೆ ಹೆಮ್ಮೆ.","I am proud of you.","I feel proud of my work.","The parents are proud."],["Bored","ಬೇಸರ","Be-sa-ra","ಮನೆಯಲ್ಲಿ ಬೇಸರ.","ಗೆಳೆಯರಿಲ್ಲದೆ ಬೇಸರ.","ಮಾಡಲು ಏನಿಲ್ಲ ಬೇಸರ.","I am bored at home.","The child gets bored without friends.","I get bored when there is nothing to do."],["Nervous","ಆತಂಕ","Aa-tan-ka","ಪರೀಕ್ಷೆ ಮೊದಲು ಆತಂಕ.","ಸಾರ್ವಜನಿಕ ಭಾಷಣ ಆತಂಕ.","ಆತಂಕ ಸಹಜ.","I am nervous before the exam.","I get nervous speaking in public.","It is normal to feel nervous."]],"opposites":[["Big / Small","ದೊಡ್ಡ / ಚಿಕ್ಕ","Dod-da/Chik-ka","ಆನೆ ದೊಡ್ಡದು, ಇಲಿ ಚಿಕ್ಕದು.","ಈ ಮನೆ ತುಂಬಾ ದೊಡ್ಡದು.","ಚೀಲ ಚಿಕ್ಕದಾದರೂ ಉಪಯೋಗಕರ.","The elephant is big, the mouse is small.","This house is very big.","My bag is small but useful."],["Fast / Slow","ವೇಗ / ನಿಧಾನ","Ve-ga/Ni-dha-na","ಕಾರು ವೇಗ, ಆಮೆ ನಿಧಾನ.","ವೇಗ ನಡೆ ಇಲ್ಲದಿದ್ದರೆ ತಡ.","ನಿಧಾನ ರೈಲು ತಡ.","The car is fast, the turtle is slow.","Walk faster or you will be late.","The slow train arrived late."],["Hot / Cold","ಬಿಸಿ / ತಣ್ಣನೆ","Bi-si/Tan-na-ne","ಕಾಫಿ ಬಿಸಿ, ನೀರು ತಣ್ಣನೆ.","ಈ ಬೇಸಿಗೆ ತುಂಬಾ ಬಿಸಿ.","ಇಲ್ಲಿ ಚಳಿಗಾಲ ತಣ್ಣನೆ.","The coffee is hot and the water cold.","This summer is /* ── Speech ── */
/* ── Strip “ — N” from number entries before speaking ──
e.g. “One — 1” → speaks only “One”
“Uno” → speaks “Uno” (unchanged)
“एक” → speaks “एक” (unchanged) */
function cleanSpeak(text){
if(!text)return text;
return text.replace(/\s*—\s*\d+\s*$/, “”).trim();
}

/* ── Voice cache — loaded once via voiceschanged event ──
Root cause of Malayalam silence: getVoices() returns [] on first call
on iOS/Android. Must wait for voiceschanged event. */
let _voices=[];
function loadVoices(){
_voices=window.speechSynthesis.getVoices();
}
if(window.speechSynthesis){
loadVoices();
window.speechSynthesis.onvoiceschanged=loadVoices;
}

/* ── Pick best voice for a language code ── */
function pickVoice(voiceLang){
const voices=_voices.length?_voices:window.speechSynthesis.getVoices();
const lc=voiceLang.toLowerCase();
const prefix=lc.split(”-”)[0];

// 1. Exact match e.g. “ml-IN”
let v=voices.find(x=>x.lang.toLowerCase()===lc);
// 2. Prefix match e.g. “ml”
if(!v) v=voices.find(x=>x.lang.toLowerCase().startsWith(prefix));
// 3. Name contains language prefix
if(!v) v=voices.find(x=>x.name.toLowerCase().includes(prefix));

// 4. Language-specific fallbacks for Indian scripts with poor TTS support
const fallbacks={
“ml”:[“ta”,“kn”,“hi”], // Malayalam → Tamil → Kannada → Hindi
“kn”:[“te”,“ta”,“hi”], // Kannada → Telugu → Tamil → Hindi
“te”:[“kn”,“ta”,“hi”], // Telugu → Kannada → Tamil → Hindi
“ta”:[“ml”,“hi”], // Tamil → Malayalam → Hindi
};
if(!v && fallbacks[prefix]){
for(const fb of fallbacks[prefix]){
v=voices.find(x=>x.lang.toLowerCase().startsWith(fb));
if(v)break;
}
}
// 5. Last resort: any Indian language voice
if(!v) v=voices.find(x=>[“hi”,“ta”,“te”,“kn”,“ml”].some(c=>x.lang.toLowerCase().startsWith(c)));
// 6. Absolute fallback: default system voice (something will speak)
if(!v && voices.length) v=voices[0];

return v;
}

function speakWord(text,voiceLang){
if(!window.speechSynthesis)return;
window.speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(cleanSpeak(text));
u.lang=voiceLang;
u.rate=voiceLang===“ml-IN”?0.78:0.82; // slightly slower for Malayalam clarity
const doSpeak=()=>{
const v=pickVoice(voiceLang);
if(v) u.voice=v;
window.speechSynthesis.speak(u);
};
// If voices not loaded yet, wait for them (fixes iOS first-load issue)
if(_voices.length>0){
doSpeak();
} else {
setTimeout(()=>{loadVoices();doSpeak();},300);
}
}

function speakSeq(items){
if(!window.speechSynthesis)return;
window.speechSynthesis.cancel();
let i=0;
const go=()=>{
if(i>=items.length)return;
const {text,voiceLang}=items[i++];
const u=new SpeechSynthesisUtterance(cleanSpeak(text));
u.lang=voiceLang;
u.rate=voiceLang===“ml-IN”?0.78:0.82;
u.onend=go;
const v=pickVoice(voiceLang);
if(v) u.voice=v;
window.speechSynthesis.speak(u);
};
// Wait for voices if needed
if(_voices.length>0){go();}
else{setTimeout(()=>{loadVoices();go();},300);}
}

/* ── Tappable sentence: each word clickable + learning word highlighted ── */
function TappableSentence({text,voiceLang,color,learnWord}){
const [activeWord,setActiveWord]=useState(null);
const words=text.split(” “);
// Check if a word matches the learning word (strip punctuation, case-insensitive)
function isLearnWord(w){
if(!learnWord)return false;
const clean=w.replace(/[।!?.,،؟。、！？]/g,””).toLowerCase();
const lw=learnWord.toLowerCase();
return clean===lw||clean.includes(lw)||lw.includes(clean);
}
return(
<div style={{display:“flex”,flexWrap:“wrap”,gap:“3px”,alignItems:“center”}}>
{words.map((w,i)=>{
const clean=w.replace(/[।!?.,،؟。、！？]/g,””);
const isActive=activeWord===i;
const isHL=isLearnWord(w);
return(
<span key={i} onClick={()=>{
setActiveWord(i);
speakWord(clean,voiceLang);
setTimeout(()=>setActiveWord(null),1000);
}} style={{
cursor:“pointer”,
fontSize:17,
fontWeight:isHL?900:400,
color:isActive?”#fff”:isHL?”#fff”:(document.body.classList.contains(“dark”)?”#e8eaf6”:”#222”),
background:isActive?color:isHL?color:“transparent”,
padding:isHL?“2px 7px”:“1px 4px”,
borderRadius:isHL?8:6,
transition:“all 0.15s”,
fontStyle:“italic”,
border:isActive?`2px solid ${color}`:isHL?`2px solid ${color}`:“1px solid transparent”,
boxShadow:isHL&&!isActive?“0 2px 6px rgba(0,0,0,0.2)”:“none”,
textDecoration:isHL?“none”:“none”,
}}>{w}</span>
);
})}
<span style={{fontSize:12,color:color,marginLeft:3,opacity:0.8}}>👆tap</span>
</div>
);
}

/* ── Confetti ── */
function launchConfetti(){
const colors=[”#E63946”,”#FFD700”,”#2ED573”,”#3D9FFF”,”#FF6BAD”,”#A855F7”];
for(let i=0;i<30;i++){
const el=document.createElement(“div”);
el.style.cssText=`position:fixed;width:9px;height:9px;border-radius:2px;pointer-events:none; left:${Math.random()*100}vw;top:-10px;background:${colors[~~(Math.random()*colors.length)]}; animation:cfall ${1.2+Math.random()}s ease-in forwards;animation-delay:${Math.random()*0.4}s;z-index:9999`;
document.body.appendChild(el);
setTimeout(()=>el.remove(),2500);
}
}

/* ── QUIZ Component ── */
function Quiz({cards,langObjs,catLabel,catId,onQuizDone,onClose,kidsMode=false}){
const KM=kidsMode;
// ── Dark mode colours available inside Quiz ──
const DM=document.body.classList.contains(“dark”);
const dmBg = DM?”#0d1117”:”#fafaf8”;
const dmCard = DM?”#161b27”:”#ffffff”;
const dmText = DM?”#ffffff”:”#1a1a2e”;
const dmSub = DM?”#a8b2d8”:”#888888”;
const dmBorder= DM?”#2d3561”:”#f0f0f0”;

const [qIdx,setQIdx]=useState(0);
const [chosen,setChosen]=useState(null);
const [score,setScore]=useState(0);
const [done,setDone]=useState(false);
const [autoSpoke,setAutoSpoke]=useState(false);
const [finalScore,setFinalScore]=useState(0);

/*

- 3 QUESTION TYPES — built once on mount, never rebuilt
- 
- Type A — “en_to_lang”: Show English → pick correct TRANSLATION
- “What does HELLO mean in Hindi?” → pick: नमस्ते / Hola / வணக்கம் / నమస్కారం
- 
- Type B — “lang_to_en”: Show TRANSLATION → pick correct ENGLISH meaning
- “What is the English meaning of नमस्ते?” → pick: Hello / Thank you / Please / No
- 
- Type C — “listen_pick”: Auto-speaks translation → pick correct ENGLISH meaning
- “🔊 Listen and pick the English meaning!” (word auto-plays) → pick: Hello / Good night / Yes / No
- 
- Each question rotates language AND type so every selected language is tested in all 3 ways.
*/
const [questions]=useState(()=>{
// Only use the languages the user actually selected
const validLangs=langObjs.filter(l=>W[l.code]&&W[l.code][catId]);
if(validLangs.length===0) return [];
const shuffledLangs=[…validLangs].sort(()=>Math.random()-0.5);
const types=[“en_to_lang”,“lang_to_en”,“listen_pick”,“phonetic_pick”,“lang_to_en”,“en_to_lang”];
return cards.map((card,ci)=>{
const lang=shuffledLangs[ci % shuffledLangs.length];
const type=types[ci % types.length];
const tr=W[lang.code]?.[catId]?.[ci]?.[1]||card[1];
const ph=W[lang.code]?.[catId]?.[ci]?.[2]||””;

if(type===“en_to_lang”){
// Q: English word shown → pick correct TRANSLATION
const allTrs=cards.map((*,j)=>W[lang.code]?.[catId]?.[j]?.[1]||cards[j][1]).filter(t=>t!==tr);
const wrongs=[…allTrs].sort(()=>Math.random()-0.5).slice(0,3);
const opts=[tr,…wrongs].sort(()=>Math.random()-0.5);
return {type,en:card[0],tr,ph,correct:tr,opts,optVoice:lang.voice,lang};
} else if(type===“phonetic_pick”){
// Q: Phonetic shown → pick correct ENGLISH meaning
const allEns=cards.map((*,j)=>cards[j][0]).filter(e=>e!==card[0]);
const wrongs=[…allEns].sort(()=>Math.random()-0.5).slice(0,3);
const opts=[card[0],…wrongs].sort(()=>Math.random()-0.5);
return {type,en:card[0],tr,ph,correct:card[0],opts,optVoice:“en-US”,lang};
} else {
// Type B (lang_to_en) & C (listen_pick): translation shown/heard → pick ENGLISH meaning
const allEns=cards.map((_,j)=>cards[j][0]).filter(e=>e!==card[0]);
const wrongs=[…allEns].sort(()=>Math.random()-0.5).slice(0,3);
const opts=[card[0],…wrongs].sort(()=>Math.random()-0.5);
return {type,en:card[0],tr,ph,correct:card[0],opts,optVoice:“en-US”,lang};
}
});
});

const q=questions[qIdx];
const total=questions.length;

// Auto-speak for listen_pick type
React.useEffect(()=>{
if(q&&q.type===“listen_pick”&&!autoSpoke){
setTimeout(()=>speakWord(q.tr,q.lang.voice),400);
setAutoSpoke(true);
}
},[qIdx]);

function pick(opt){
if(chosen!==null)return;
setChosen(opt);
if(opt===q.correct){
setScore(s=>s+1);
playCorrectSound();
// Correct: speak the answer in target language
setTimeout(()=>speakWord(opt,q.optVoice),700);
} else {
playWrongSound();
// Wrong: say “The correct answer is [word]” then speak it
setTimeout(()=>{
// First say the announcement in English
const announce=new SpeechSynthesisUtterance(“The correct answer is: “+q.correct);
announce.lang=“en-US”;
announce.rate=0.9;
announce.onend=()=>{
// Then speak the correct word in the target language
setTimeout(()=>speakWord(q.correct,q.optVoice),300);
};
window.speechSynthesis.cancel();
window.speechSynthesis.speak(announce);
},500);
}
}
// Get animation class for kids mode
function getAnswerAnim(opt){
if(!KM||chosen===null)return “”;
if(opt===q.correct)return “kids-correct”;
if(opt===chosen&&chosen!==q.correct)return “kids-wrong”;
return “”;
}
function next(){
setAutoSpoke(false);
if(qIdx<total-1){setQIdx(i=>i+1);setChosen(null);}
else{
// finalScore = score + 1 if last answer was correct, else just score
const fs=score+(chosen===q.correct?1:0);
setFinalScore(fs);
setDone(true);
onQuizDone&&onQuizDone(catId,fs,total);
if(fs>=Math.ceil(total*0.7))launchConfetti();

/* ══════════════════════════════════════════════════════════════
MULTI-USER SYSTEM
Users stored in localStorage as:
ld_users = [{id, name, age, password, createdAt, isAdmin}]
ld_current_user = userId
ld_prog_<userId> = progress
ld_favs_<userId> = favourites
ld_langs_<userId> = selected languages
══════════════════════════════════════════════════════════════ */

const ADMIN_ID = “admin_lakshmi”;

function getUsers(){
try{ return JSON.parse(localStorage.getItem(“ld_users”)||”[]”); }catch(e){ return []; }
}
function saveUsers(users){
try{ localStorage.setItem(“ld_users”, JSON.stringify(users)); }catch(e){}
}
function getCurrentUser(){
try{
const id = localStorage.getItem(“ld_current_user”);
if(!id) return null;
return getUsers().find(u=>u.id===id)||null;
}catch(e){ return null; }
}
function setCurrentUser(user){
try{ localStorage.setItem(“ld_current_user”, user?user.id:””); }catch(e){}
}
function getUserProg(userId){
try{ return JSON.parse(localStorage.getItem(“ld_prog_”+userId)||”{}”); }catch(e){ return {}; }
}
function saveUserProg(userId, prog){
try{ localStorage.setItem(“ld_prog_”+userId, JSON.stringify(prog)); }catch(e){}
}
function getUserFavs(userId){
try{ return JSON.parse(localStorage.getItem(“ld_favs_”+userId)||”[]”); }catch(e){ return []; }
}
function saveUserFavs(userId, favs){
try{ localStorage.setItem(“ld_favs_”+userId, JSON.stringify(favs)); }catch(e){}
}
function getUserLangs(userId){
try{ return JSON.parse(localStorage.getItem(“ld_langs_”+userId)||”[]”); }catch(e){ return []; }
}
function saveUserLangs(userId, langs){
try{ localStorage.setItem(“ld_langs_”+userId, JSON.stringify(langs)); }catch(e){}
}
function registerUser(name, age, password){
const users = getUsers();
const exists = users.find(u=>u.name.toLowerCase()===name.trim().toLowerCase());
if(exists) return {error:“Name already taken. Please choose another.”};
const id = “u_”+Date.now()+”_”+Math.random().toString(36).slice(2,6);
const isAdmin = users.length===0; // First registered user becomes admin
const ageNum = parseInt(age)||0;
const kidsMode = ageNum>0 && ageNum<18; // Auto kids mode for under 18
const user = {id, name:name.trim(), age:ageNum, password,
createdAt:new Date().toISOString(), isAdmin, kidsMode};
users.push(user);
saveUsers(users);
return {user};
}
function loginUser(name, password){
const users = getUsers();
// Find user by name (case-insensitive)
const user = users.find(u=>u.name.toLowerCase()===name.trim().toLowerCase());
if(!user) return {error:“Name not found. Please register first.”};
if(user.password!==password) return {error:“Wrong password. Please try again.”};
return {user};
}

function App(){
const [currentUser, setCurrentUser_s] = useState(()=>getCurrentUser());
const [authScreen, setAuthScreen] = useState(“login”);
const [screen, setScreen] = useState(“home”);
const [selLangs, setSelLangs] = useState(()=>{ const u=getCurrentUser(); return u?getUserLangs(u.id):[]; });
const [cat, setCat] = useState(“greetings”);
const [idx, setIdx] = useState(0);
const [region, setRegion] = useState(“All”);
const [speakAll, setSpeakAll] = useState(false);
const [prog, setProg] = useState(()=>{ const u=getCurrentUser(); return u?getUserProg(u.id):{}; });
const [search, setSearch] = useState(””);
const [showSearch, setShowSearch] = useState(false);
const [favs, setFavs] = useState(()=>{ const u=getCurrentUser(); return u?getUserFavs(u.id):[]; });
const [flashMode, setFlashMode] = useState(false);
const [flashFlipped, setFlashFlipped] = useState(false);
const [flipping, setFlipping] = useState(false);
const [animClass, setAnimClass] = useState(””);
const [kidsMode, setKidsMode] = useState(()=>{try{return localStorage.getItem(“ld_kids”)===“1”;}catch(e){return false;}});
const [darkMode, setDarkMode] = useState(()=>{try{return localStorage.getItem(“ld_dark”)===“1”;}catch(e){return false;}});
const dailyGoal = 10;

React.useEffect(()=>{ document.body.classList.toggle(“kids”,kidsMode); try{localStorage.setItem(“ld_kids”,kidsMode?“1”:“0”);}catch(e){} },[kidsMode]);
React.useEffect(()=>{ document.body.classList.toggle(“dark”,darkMode); try{localStorage.setItem(“ld_dark”,darkMode?“1”:“0”);}catch(e){} },[darkMode]);

const KM=kidsMode, DM=darkMode;
const dmBg =DM?”#0d1117”:”#fafaf8”;
const dmCard =DM?”#161b27”:”#ffffff”;
const dmText =DM?”#ffffff”:”#1a1a2e”;
const dmSub =DM?”#a8b2d8”:”#888888”;
const dmBorder=DM?”#2d3561”:”#f0f0f0”;

const totalStars = prog.totalStars||0;
const streak = prog.streak||0;
const quizScores = prog.quizScores||{};
const completedCats = prog.completedCats||[];
const wordsLearnedToday= prog.wordsToday||0;
const goalDone = wordsLearnedToday>=dailyGoal;

/* ── Auth helpers ── */
function doLogin(name,pwd){
const res=loginUser(name,pwd);
if(res.error) return res.error;
setCurrentUser(res.user);
setCurrentUser_s(res.user);
setSelLangs(getUserLangs(res.user.id));
setProg(getUserProg(res.user.id));
setFavs(getUserFavs(res.user.id));
// Auto-activate kids mode if user is under 18
if(res.user.kidsMode){
setKidsMode(true);
try{localStorage.setItem(“ld_kids”,“1”);}catch(e){}
}
return null;
}
function doRegister(name,age,pwd){
if(!name.trim()) return “Please enter your name.”;
if(!pwd) return “Please enter a password.”;
const res=registerUser(name,age,pwd);
if(res.error) return res.error;
setCurrentUser(res.user);
setCurrentUser_s(res.user);
// Auto-activate kids mode immediately if under 18
if(res.user.kidsMode){
setKidsMode(true);
try{localStorage.setItem(“ld_kids”,“1”);}catch(e){}
}
return null;
}
function doLogout(){
setCurrentUser(null); setCurrentUser_s(null);
setScreen(“home”); setSelLangs([]); setProg({}); setFavs([]);
}

/* ── Data helpers ── */
function updateLangs(langs){
setSelLangs(langs);
if(currentUser) saveUserLangs(currentUser.id,langs);
}
function toggleFav(key){
const n=favs.includes(key)?favs.filter(f=>f!==key):[…favs,key];
setFavs(n);
if(currentUser) saveUserFavs(currentUser.id,n);

// ── Flashcard 3D flip ──
function playFlipSound(){
try{
const ctx=new(window.AudioContext||window.webkitAudioContext)();
// Soft whoosh + click sound
const buf=ctx.createBuffer(1,ctx.sampleRate*0.18,ctx.sampleRate);
const data=buf.getChannelData(0);
for(let i=0;i<data.length;i++){
const t=i/ctx.sampleRate;
// Whoosh: filtered noise sweep
data[i]=(Math.random()*2-1)*Math.exp(-t*18)*0.4;
// Add a soft click at start
if(i<300) data[i]+=(Math.random()*2-1)*Math.exp(-i/80)*0.3;
}
const src=ctx.createBufferSource();
const filt=ctx.createBiquadFilter();
filt.type=“bandpass”;
filt.frequency.setValueAtTime(1200,ctx.currentTime);
filt.frequency.linearRampToValueAtTime(400,ctx.currentTime+0.18);
filt.Q.value=0.8;
const gain=ctx.createGain();
gain.gain.setValueAtTime(0.6,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.18);
src.buffer=buf;
src.connect(filt);
filt.connect(gain);
gain.connect(ctx.destination);
src.start();
}catch(e){}
}
