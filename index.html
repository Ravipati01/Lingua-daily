/* ── Speech ── */
/* ── Strip " — N" from number entries before speaking ──
e.g. "One — 1" → speaks only "One"
"Uno" → speaks "Uno" (unchanged)
"एक" → speaks "एक" (unchanged) */
function cleanSpeak(text){
if(!text)return text;
return text.replace(/\s*—\s*\d+\s*$/, "").trim();
}

/* ── Voice cache — loaded once via voiceschanged event ──
Root cause of Malayalam silence: getVoices() returns [] on first call
on iOS/Android. Must wait for voiceschanged event. */
let _voices=[];
function loadVoices(){
_voices=window.speechSynthesis.getVoices();
}
if(window.speechSynthesis){
loadVoices();
window.speechSynthesis.onvoiceschanged=loadVoices;
}

/* ── Pick best voice for a language code ── */
function pickVoice(voiceLang){
const voices=_voices.length?_voices:window.speechSynthesis.getVoices();
const lc=voiceLang.toLowerCase();
const prefix=lc.split("-")[0];

// 1. Exact match e.g. "ml-IN"
let v=voices.find(x=>x.lang.toLowerCase()===lc);
// 2. Prefix match e.g. "ml"
if(!v) v=voices.find(x=>x.lang.toLowerCase().startsWith(prefix));
// 3. Name contains language prefix
if(!v) v=voices.find(x=>x.name.toLowerCase().includes(prefix));

// 4. Language-specific fallbacks for Indian scripts with poor TTS support
const fallbacks={
"ml":["ta","kn","hi"], // Malayalam → Tamil → Kannada → Hindi
"kn":["te","ta","hi"], // Kannada → Telugu → Tamil → Hindi
"te":["kn","ta","hi"], // Telugu → Kannada → Tamil → Hindi
"ta":["ml","hi"], // Tamil → Malayalam → Hindi
};
if(!v && fallbacks[prefix]){
for(const fb of fallbacks[prefix]){
v=voices.find(x=>x.lang.toLowerCase().startsWith(fb));
if(v)break;
}
}
// 5. Last resort: any Indian language voice
if(!v) v=voices.find(x=>["hi","ta","te","kn","ml"].some(c=>x.lang.toLowerCase().startsWith(c)));
// 6. Absolute fallback: default system voice (something will speak)
if(!v && voices.length) v=voices[0];

return v;
}

function speakWord(text,voiceLang){
if(!window.speechSynthesis)return;
window.speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(cleanSpeak(text));
u.lang=voiceLang;
u.rate=voiceLang==="ml-IN"?0.78:0.82; // slightly slower for Malayalam clarity
const doSpeak=()=>{
const v=pickVoice(voiceLang);
if(v) u.voice=v;
window.speechSynthesis.speak(u);
};
// If voices not loaded yet, wait for them (fixes iOS first-load issue)
if(_voices.length>0){
doSpeak();
} else {
setTimeout(()=>{loadVoices();doSpeak();},300);
}
}

function speakSeq(items){
if(!window.speechSynthesis)return;
window.speechSynthesis.cancel();
let i=0;
const go=()=>{
if(i>=items.length)return;
const {text,voiceLang}=items[i++];
const u=new SpeechSynthesisUtterance(cleanSpeak(text));
u.lang=voiceLang;
u.rate=voiceLang==="ml-IN"?0.78:0.82;
u.onend=go;
const v=pickVoice(voiceLang);
if(v) u.voice=v;
window.speechSynthesis.speak(u);
};
// Wait for voices if needed
if(_voices.length>0){go();}
else{setTimeout(()=>{loadVoices();go();},300);}
}

function TappableSentence({text,voiceLang,color,learnWord}){

if(!learnWord)return false;
const clean=w.replace(/[।!?.,،؟。、！？]/g,"").toLowerCase();

return clean===lw||clean.includes(lw)||lw.includes(clean);
}

/* ── QUIZ Component ── */
function Quiz({cards,langObjs,catLabel,catId,onQuizDone,onClose,kidsMode=false}){
const KM=kidsMode;
const [qIdx,setQIdx]=useState(0);
const [chosen,setChosen]=useState(null);
const [score,setScore]=useState(0);
const [done,setDone]=useState(false);
const [autoSpoke,setAutoSpoke]=useState(false);
const [finalScore,setFinalScore]=useState(0);

/*
* 3 QUESTION TYPES — built once on mount, never rebuilt
*
* Type A — "en_to_lang": Show English → pick correct TRANSLATION
* "What does HELLO mean in Hindi?" → pick: नमस्ते / Hola / வணக்கம் / నమస్కారం
*
* Type B — "lang_to_en": Show TRANSLATION → pick correct ENGLISH meaning
* "What is the English meaning of नमस्ते?" → pick: Hello / Thank you / Please / No
*
* Type C — "listen_pick": Auto-speaks translation → pick correct ENGLISH meaning
* "🔊 Listen and pick the English meaning!" (word auto-plays) → pick: Hello / Good night / Yes / No
*
* Each question rotates language AND type so every selected language is tested in all 3 ways.
*/
const [questions]=useState(()=>{
const shuffledLangs=[...langObjs].sort(()=>Math.random()-0.5);
const types=["en_to_lang","lang_to_en","listen_pick","phonetic_pick","lang_to_en","en_to_lang"];
return cards.map((card,ci)=>{
const lang=shuffledLangs[ci % shuffledLangs.length];
const type=types[ci % types.length];
const tr=W[lang.code]?.[catId]?.[ci]?.[1]||card[1];
const ph=W[lang.code]?.[catId]?.[ci]?.[2]||"";

if(type==="en_to_lang"){
// Q: English word shown → pick correct TRANSLATION
const allTrs=cards.map((_,j)=>W[lang.code]?.[catId]?.[j]?.[1]||cards[j][1]).filter(t=>t!==tr);
const wrongs=[...allTrs].sort(()=>Math.random()-0.5).slice(0,3);
const opts=[tr,...wrongs].sort(()=>Math.random()-0.5);
return {type,en:card[0],tr,ph,correct:tr,opts,optVoice:lang.voice,lang};
} else if(type==="phonetic_pick"){
// Q: Phonetic shown → pick correct ENGLISH meaning
const allEns=cards.map((_,j)=>cards[j][0]).filter(e=>e!==card[0]);
const wrongs=[...allEns].sort(()=>Math.random()-0.5).slice(0,3);
const opts=[card[0],...wrongs].sort(()=>Math.random()-0.5);
return {type,en:card[0],tr,ph,correct:card[0],opts,optVoice:"en-US",lang};
} else {
// Type B (lang_to_en) & C (listen_pick): translation shown/heard → pick ENGLISH meaning
const allEns=cards.map((_,j)=>cards[j][0]).filter(e=>e!==card[0]);
const wrongs=[...allEns].sort(()=>Math.random()-0.5).slice(0,3);
const opts=[card[0],...wrongs].sort(()=>Math.random()-0.5);
return {type,en:card[0],tr,ph,correct:card[0],opts,optVoice:"en-US",lang};
}
});
});

const q=questions[qIdx];
const total=questions.length;

// Auto-speak for listen_pick type
React.useEffect(()=>{
if(q&&q.type==="listen_pick"&&!autoSpoke){
setTimeout(()=>speakWord(q.tr,q.lang.voice),400);
setAutoSpoke(true);
}
},[qIdx]);

function pick(opt){
if(chosen!==null)return;
setChosen(opt);
if(opt===q.correct){
setScore(s=>s+1);
speakWord(opt,q.optVoice);
} else {
speakWord(q.correct,q.optVoice);
}
}
function next(){
setAutoSpoke(false);
if(qIdx<total-1){setQIdx(i=>i+1);setChosen(null);}
else{
// finalScore = score + 1 if last answer was correct, else just score
const fs=score+(chosen===q.correct?1:0);
setFinalScore(fs);
setDone(true);
onQuizDone&&onQuizDone(catId,fs,total);
if(fs>=Math.ceil(total*0.7))launchConfetti();
}
}

// ── QUESTION TYPE BADGE colours ──
const typeMeta={
en_to_lang: {badge:"🌍 Translate to "+q.lang.name, color:"#6C63FF", hint:"Tap any option to hear • Tap ✓ to select"},
lang_to_en: {badge:"🇬🇧 What is the English meaning?",color:"#2D9CDB", hint:"Tap any option to hear • Tap ✓ to select"},
listen_pick: {badge:"🎧 Listen & Pick!", color:"#E63946", hint:"Auto-playing… tap option bar to hear again"},
phonetic_pick: {badge:"🔤 Match the Pronunciation!", color:"#FF9933", hint:"Read phonetic → pick English word • Tap ✓ to select"},
};
const meta=typeMeta[q.type];

if(done){
const finalScore=score;
return(
<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,
background:KM?"linear-gradient(180deg,#FFF0FB 0%,#E8F4FD 100%)":"#fff"}}>
<div style={{fontSize:KM?80:64,marginBottom:KM?16:12}}>
{finalScore===total?"🏆":finalScore>=total*0.7?"🌟":"💪"}
</div>
<div style={{fontSize:KM?34:28,fontWeight:900,color:KM?"#7C3AED":"#1a1a2e",marginBottom:6,
fontFamily:KM?"'Nunito',sans-serif":"inherit"}}>
{finalScore===total?(KM?"🎉 Amazing! 🎉":"Perfect!"):finalScore>=total*0.7?(KM?"⭐ Great Job! ⭐":"Well done!"):(KM?"💪 Try Again! 💪":"Keep going!")}
</div>
<div style={{fontSize:52,fontWeight:900,color:"#E63946",marginBottom:6}}>{finalScore}/{total}</div>
<div style={{fontSize:14,color:DM?"#c8d0f0":"#888",marginBottom:8,fontWeight:700,textAlign:"center"}}>
{finalScore===total?"You know all words in all languages! 🎉":finalScore>=total*0.7?"Almost perfect! Try again to get 100%":"Practice makes perfect — try again!"}
</div>
{/* Stars earned */}
<div style={{background:DM?"#2a2a1e":"#FFF8DC",borderRadius:16,padding:"10px 24px",marginBottom:20,textAlign:"center"}}>
<div style={{fontSize:13,color:"#996600",fontWeight:700}}>Stars earned this quiz</div>
<div style={{fontSize:28,fontWeight:900,color:"#FF9933"}}>⭐ {finalScore*10}</div>
</div>
<button onClick={()=>{setQIdx(0);setChosen(null);setScore(0);setFinalScore(0);setDone(false);setAutoSpoke(false);}} style={{
padding:"14px 24px",borderRadius:16,border:"none",background:"linear-gradient(135deg,#E63946,#C02030)",
color:"#fff",fontWeight:800,fontSize:16,cursor:"pointer",marginBottom:10,width:"100%",
boxShadow:"0 6px 16px rgba(230,57,70,0.35)"}}>
🔄 Try Again
</button>
<button onClick={onClose} style={{
padding:"14px 24px",borderRadius:16,border:`2px solid ${DM?"#2a2a4e":"#eee"}`,background:DM?"#1a1a2e":"#fff",
color:DM?"#ffffff":"#555",fontWeight:800,fontSize:15,cursor:"pointer",width:"100%"}}>
← Back to Learning
</button>
</div>
);
}

return(
<div style={{flex:1,overflowY:"auto",padding:"16px 14px 24px",background:dmBg,transition:"background .3s"}}>

{/* Progress bar */}
<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
<div style={{flex:1,height:10,background:DM?"#2a2a4e":"#eee",borderRadius:5,overflow:"hidden"}}>

</div>
<div style={{fontSize:13,color:DM?"#ffffff":"#888",fontWeight:800}}>{qIdx+1}/{total}</div>

{/* Score + Question type badge */}

{/* The word/translation to identify */}
{q.type==="en_to_lang"&&(

<div style={{fontSize:12,color:"rgba(255,255,255,0.65)",marginTop:10,fontWeight:500}}>{meta.hint}</div>
</div>

{/* Answer Options */}
<div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
{q.opts.map((opt,i)=>{
const isCorrect=opt===q.correct;
const isChosen=opt===chosen;
let bg=dmCard,border=`2px solid ${dmBorder}`,col=dmText;
if(chosen!==null){
if(isCorrect){bg="#E8FFE8";border="2px solid #2ED573";col="#1A8030";}
else if(isChosen&&!isCorrect){bg="#FFE8E8";border="2px solid #FF4757";col="#CC2030";}
}
// Kids badge = coloured shape instead of A/B/C/D
const kidsBadges=["🔴","🔵","🟡","🟢"];
return(
<div key={i}
onClick={()=>speakWord(opt,q.optVoice)}
style={{padding:KM?"16px 16px":"13px 14px",
borderRadius:KM?22:16,border,background:bg,
display:"flex",alignItems:"center",gap:KM?12:10,transition:"all .2s",
boxShadow:KM?"0 4px 14px rgba(0,0,0,0.1)":"0 2px 8px rgba(0,0,0,0.06)",
cursor:"pointer",userSelect:"none"}}>
{/* Badge */}
<div style={{width:KM?40:34,height:KM?40:34,borderRadius:"50%",flexShrink:0,
background:KM?"transparent":chosen===null?(DM?"#2a2a4e":"#e8e8e8"):isCorrect?"#2ED573":isChosen?"#FF4757":(DM?"#2a2a4e":"#e8e8e8"),
display:"flex",alignItems:"center",justifyContent:"center",
fontWeight:800,fontSize:KM?26:15,color:chosen===null?(DM?"#ffffff":"#888"):"#fff"}}>
{KM?kidsBadges[i]:["A","B","C","D"][i]}
</div>
{/* Option text */}
<div style={{flex:1,lineHeight:1.3}}>
<div style={{fontSize:KM?24:21,fontWeight:KM?900:700,color:col,
fontFamily:KM?"'Nunito',sans-serif":"inherit"}}>{opt}</div>
<div style={{fontSize:KM?13:11,color:DM?"#8888cc":"#bbb",marginTop:1,fontWeight:KM?600:400}}>
{KM?"👆 tap to hear 🔊":"👆 tap to hear"}
</div>
</div>
{/* ✓ SELECT — unselected = white/outline, selected = filled */}
{chosen===null&&(
<button onClick={e=>{e.stopPropagation();pick(opt);}}
style={{width:KM?50:42,height:KM?50:42,borderRadius:"50%",flexShrink:0,
border:KM?"3px dashed #c0a0e8":"2.5px solid #ccc",
background:KM?(DM?"#2a2a4e":"#fff"):(DM?"#1e1e3a":"#fff"),
cursor:"pointer",fontSize:KM?22:18,display:"flex",alignItems:"center",
justifyContent:"center",color:KM?"#c0a0e8":(DM?"#8888cc":"#bbb"),fontWeight:900}}>
✓
</button>
)}
{chosen!==null&&isCorrect&&<span style={{fontSize:KM?36:28,flexShrink:0}}>✅</span>}
{chosen!==null&&isChosen&&!isCorrect&&<span style={{fontSize:KM?36:28,flexShrink:0}}>❌</span>}
</div>
);
})}
</div>

{/* Feedback + Next */}
{chosen!==null&&(
<div>
<div style={{borderRadius:16,padding:"14px 16px",marginBottom:12,textAlign:"center",
background:chosen===q.correct?"linear-gradient(135deg,#2ED573,#1AB055)":"linear-gradient(135deg,#FF4757,#C02030)",
color:"#fff"}}>
<div style={{fontSize:22,fontWeight:900}}>{chosen===q.correct?"🎉 Correct!":"❌ Not quite!"}</div>
{chosen!==q.correct&&(
<div style={{fontSize:14,marginTop:5,opacity:.95,fontWeight:700}}>
✅ Answer: <span style={{fontSize:17}}>{q.correct}</span>
</div>
)}
</div>
<button onClick={next} style={{width:"100%",padding:"15px",borderRadius:16,border:"none",
background:"linear-gradient(135deg,#1a1a2e,#3a3a6e)",color:"#fff",fontWeight:900,fontSize:18,
cursor:"pointer",boxShadow:"0 6px 18px rgba(26,26,46,0.3)"}}>
{qIdx<total-1?"Next Question →":"See Results 🏆"}
</button>
</div>
)}
</div>
);
}

/* ── Shell ── */
function Shell({children}){
return(
<div style={{minHeight:"100vh",background:"linear-gradient(145deg,#0f0f1a,#1a1a2e,#16213e)",display:"flex",justifyContent:"center",alignItems:"flex-start",padding:"20px 10px",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
<div className="shell-card" style={{width:"100%",maxWidth:420,minHeight:"calc(100vh - 40px)",borderRadius:40,overflow:"hidden",boxShadow:"0 40px 120px rgba(0,0,0,0.6)",display:"flex",flexDirection:"column"}}>
{children}
</div>
</div>
);
}

/* ── Progress helpers ── */
function loadProg(){try{return JSON.parse(localStorage.getItem("ld_prog")||"{}");}catch(e){return{};}}
function saveProg(p){try{localStorage.setItem("ld_prog",JSON.stringify(p));}catch(e){}}
function todayStr(){return new Date().toISOString().slice(0,10);}

/* ── Main App ── */
function App(){
const [screen,setScreen]=useState("home");
const [selLangs,setSelLangs]=useState(()=>{try{return JSON.parse(localStorage.getItem("ld_langs")||"[]");}catch(e){return[];}});
const [cat,setCat]=useState("greetings");
const [idx,setIdx]=useState(0);
const [region,setRegion]=useState("All");
const [speakAll,setSpeakAll]=useState(false);
const [prog,setProg]=useState(()=>loadProg());
const [search,setSearch]=useState("");
const [showSearch,setShowSearch]=useState(false);
const [favs,setFavs]=useState(()=>{try{return JSON.parse(localStorage.getItem("ld_favs")||"[]");}catch(e){return[];}});
const [dailyGoal]=useState(10);
const [flashMode,setFlashMode]=useState(false);
const [flashFlipped,setFlashFlipped]=useState(false);
const [kidsMode,setKidsMode]=useState(()=>{try{return localStorage.getItem("ld_kids")==="1";}catch(e){return false;}});
const [darkMode,setDarkMode]=useState(()=>{try{return localStorage.getItem("ld_dark")==="1";}catch(e){return false;}});

// Apply/remove kids mode class on body
React.useEffect(()=>{
document.body.classList.toggle("kids",kidsMode);
try{localStorage.setItem("ld_kids",kidsMode?"1":"0");}catch(e){}
},[kidsMode]);

// Apply dark mode
React.useEffect(()=>{
document.body.classList.toggle("dark", darkMode);
try{localStorage.setItem("ld_dark",darkMode?"1":"0");}catch(e){}
},[darkMode]);

const KM=kidsMode; // shorthand
const DM=darkMode; // shorthand

// Dynamic colors based on dark mode
// ── Dark mode colour system ──────────────────────────────────
// bg = page/shell background (darkest)
// card = card surfaces (slightly lighter than bg)
// text = primary text → PURE WHITE for max readability
// sub = secondary/label text → bright enough to read
// border = card borders & dividers
const dmBg = DM?"#0d1117":"#fafaf8"; // deepest dark bg
const dmCard = DM?"#161b27":"#ffffff"; // card bg, distinct from bg
const dmText = DM?"#ffffff":"#1a1a2e"; // PRIMARY TEXT = pure white
const dmSub = DM?"#a8b2d8":"#888888"; // secondary text = soft blue-white
const dmBorder= DM?"#2d3561":"#f0f0f0"; // borders & dividers

const totalStars=prog.totalStars||0;
const streak=prog.streak||0;
const quizScores=prog.quizScores||{};
const completedCats=prog.completedCats||[];
const wordsLearnedToday=prog.wordsToday||0;
const goalDone=wordsLearnedToday>=dailyGoal;

function updateLangs(langs){setSelLangs(langs);try{localStorage.setItem("ld_langs",JSON.stringify(langs));}catch(e){}}

// ── Favourites helpers ──
function toggleFav(key){
const n=favs.includes(key)?favs.filter(f=>f!==key):[...favs,key];
setFavs(n);
try{localStorage.setItem("ld_favs",JSON.stringify(n));}catch(e){}
}

// ── Daily goal: count word views ──
function markWordViewed(){
const p=loadProg();
const today=todayStr();
if(p.goalDate!==today){p.goalDate=today;p.wordsToday=0;}
p.wordsToday=(p.wordsToday||0)+1;
saveProg(p);setProg({...p});
}

function onQuizDone(catId,score,tot){
const p=loadProg();
p.quizScores=p.quizScores||{};
p.quizScores[catId]=Math.max(p.quizScores[catId]||0,score);
p.totalStars=(p.totalStars||0)+score*10;
p.completedCats=p.completedCats||[];
if(score>=Math.ceil(tot*0.7)&&!p.completedCats.includes(catId))p.completedCats.push(catId);
const today=todayStr();
if(p.lastDate!==today){
const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
p.streak=p.lastDate===yest?(p.streak||0)+1:1;
p.lastDate=today;
}
saveProg(p);setProg({...p});
}

const activeLangs=LANGS.filter(l=>selLangs.includes(l.code));
const cards=(activeLangs.length>0&&W[activeLangs[0].code]?.[cat])||[];
const total=cards.length;
const card=cards[idx];
const getTr=code=>W[code]?.[cat]?.[idx]??null;

const next=()=>{setIdx(i=>(i+1)%total);setFlashFlipped(false);markWordViewed();};
const prev=()=>{setIdx(i=>(i-1+total)%total);setFlashFlipped(false);};

function doSpeakAll(){
const items=activeLangs.map(l=>{const c=getTr(l.code);return{text:c?c[1]:"",voiceLang:l.voice};});
setSpeakAll(true);speakSeq(items);
setTimeout(()=>setSpeakAll(false),items.length*2200);
}
const toggle=code=>{const n=selLangs.includes(code)?selLangs.filter(c=>c!==code):[...selLangs,code];updateLangs(n);};
const filtered=LANGS.filter(l=>region==="All"||l.region===region);

/* ── HOME ── */
if(screen==="home") return(
<Shell>
<div style={{background:"linear-gradient(135deg,#1a1a2e,#16213e)",padding:"48px 22px 22px",position:"relative",overflow:"hidden"}}>
<div style={{position:"absolute",top:-40,right:-40,width:160,height:160,borderRadius:"50%",background:"rgba(255,153,51,0.18)"}}/>
<div style={{position:"relative"}}>
<div style={{fontSize:13,color:"rgba(255,255,255,0.85)",letterSpacing:3,textTransform:"uppercase",marginBottom:6,fontWeight:800}}>🔥 Multi-Language Learning</div>
<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
<div style={{fontSize:KM?32:30,fontWeight:900,color:"#fff",textShadow:"0 2px 8px rgba(0,0,0,0.3)",
fontFamily:KM?"'Nunito',sans-serif":"'Fredoka One',cursive",flex:1}}>
{KM?"🌈 LinguaKids":"LinguaDaily"}
</div>
{/* Kids mode toggle */}
<button onClick={()=>setKidsMode(m=>!m)}
style={{background:KM?"#FFD700":"rgba(255,255,255,0.18)",border:"none",borderRadius:16,
padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:800,
color:KM?"#1a1a2e":"#fff",flexShrink:0}}>
{KM?"🧒 Kids":"👤 Adult"}
</button>
{/* Dark mode toggle */}
<button onClick={()=>setDarkMode(m=>!m)}
style={{background:DM?"#FFD700":"rgba(255,255,255,0.18)",border:"none",borderRadius:16,
padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:800,
color:DM?"#1a1a2e":"#fff",flexShrink:0}}>
{DM?"☀️ Light":"🌙 Dark"}
</button>
</div>
<div style={{display:"flex",gap:10,marginTop:6,flexWrap:"wrap"}}>
<div style={{textAlign:"center",flex:1}}>
<div style={{fontFamily:"'Fredoka One',cursive",fontSize:22,color:"#FFD700"}}>⭐ {totalStars}</div>
<div style={{fontSize:11,color:"rgba(255,255,255,0.85)",textTransform:"uppercase",letterSpacing:1,fontWeight:700}}>Stars</div>
</div>
<div style={{textAlign:"center",flex:1}}>
<div style={{fontFamily:"'Fredoka One',cursive",fontSize:22,color:"#FF9933"}}>🔥 {streak}</div>
<div style={{fontSize:11,color:"rgba(255,255,255,0.85)",textTransform:"uppercase",letterSpacing:1,fontWeight:700}}>Streak</div>
</div>
<div style={{textAlign:"center",flex:1}}>
<div style={{fontFamily:"'Fredoka One',cursive",fontSize:22,color:"#2ED573"}}>✅ {completedCats.length}/{CATS.length}</div>
<div style={{fontSize:11,color:"rgba(255,255,255,0.85)",textTransform:"uppercase",letterSpacing:1,fontWeight:700}}>Done</div>
</div>
<div style={{textAlign:"center",flex:1}}>
<div style={{fontFamily:"'Fredoka One',cursive",fontSize:22,color:goalDone?"#2ED573":"#aaa"}}>{goalDone?"🎯":"📅"} {Math.min(wordsLearnedToday,dailyGoal)}/{dailyGoal}</div>
<div style={{fontSize:11,color:"rgba(255,255,255,0.85)",textTransform:"uppercase",letterSpacing:1,fontWeight:700}}>Today</div>
</div>
</div>
{/* Daily goal bar */}
<div style={{marginTop:8,height:6,background:"rgba(255,255,255,0.15)",borderRadius:3,overflow:"hidden"}}>
<div style={{height:"100%",width:`${Math.min(100,(wordsLearnedToday/dailyGoal)*100)}%`,
background:goalDone?"#2ED573":"#FF9933",borderRadius:3,transition:"width .5s"}}/>
</div>
{goalDone&&<div style={{fontSize:12,color:"#2ED573",fontWeight:800,marginTop:4}}>🎉 Daily goal complete!</div>}
</div>
</div>
<div style={{padding:"16px",flex:1,overflowY:"auto",background:dmBg,transition:"background .3s"}}>
{/* Progress summary cards */}
{completedCats.length>0&&(
<div style={{marginBottom:16}}>
<div style={{fontSize:11,fontWeight:700,color:dmSub,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>📊 Your Progress</div>
<div style={{display:"flex",flexDirection:"column",gap:5}}>
{CATS.filter(c=>quizScores[c.id]!==undefined).map(c=>{
const sc=quizScores[c.id]||0;
const tot=W["es"]?.[c.id]?.length||10;
const pct=Math.round((sc/tot)*100);
const done=completedCats.includes(c.id);
return(
<div key={c.id} style={{background:dmCard,borderRadius:12,padding:"8px 12px",display:"flex",alignItems:"center",gap:10,boxShadow:DM?"0 2px 8px rgba(0,0,0,0.4)":"0 2px 8px rgba(0,0,0,0.06)"}}>
<span style={{fontSize:18}}>{c.icon}</span>
<div style={{flex:1}}>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
<span style={{fontWeight:700,fontSize:12,color:dmText}}>{c.label}</span>
<span style={{fontSize:12,fontWeight:700,color:done?"#2ED573":"#FF9933"}}>{done?"✅ Passed":"⭐ "+sc+"/"+tot}</span>
</div>
<div style={{height:5,background:DM?"#2a2a4e":"#f0f0f0",borderRadius:3,overflow:"hidden"}}>
<div style={{height:"100%",width:pct+"%",background:done?"#2ED573":"#FF9933",borderRadius:3,transition:"width .4s"}}/>
</div>
</div>
</div>
);
})}
</div>
</div>
)}
{/* ── Quick Action Buttons ── */}
<div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
<button onClick={()=>setShowSearch(s=>!s)} style={{flex:1,minWidth:120,padding:"10px",borderRadius:14,border:`2px solid ${dmBorder}`,
background:showSearch?"#1a1a2e":dmCard,color:showSearch?"#fff":dmText,fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
🔍 {showSearch?"Close":"Search"}
</button>
<button onClick={()=>setScreen("favourites")} style={{flex:1,minWidth:120,padding:"10px",borderRadius:14,border:`2px solid ${dmBorder}`,
background:dmCard,color:dmText,fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
⭐ Favs {favs.length>0&&<span style={{background:"#E63946",color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:11,fontWeight:800}}>{favs.length}</span>}
</button>
</div>
{/* Export / Import progress row */}
<div style={{display:"flex",gap:8,marginBottom:16}}>
<button onClick={()=>{
const prog=loadProg();
const bundle={prog,favs,langs:selLangs,version:"1.0"};
const blob=new Blob([JSON.stringify(bundle,null,2)],{type:"application/json"});
const url=URL.createObjectURL(blob);
const a=document.createElement("a");
a.href=url;a.download="lingua_progress.json";a.click();
URL.revokeObjectURL(url);
}} style={{flex:1,padding:"9px",borderRadius:14,border:`2px solid ${dmBorder}`,
background:dmCard,color:dmText,fontWeight:700,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
📤 Export Progress
</button>
<button onClick={()=>{
const inp=document.createElement("input");
inp.type="file";inp.accept=".json";
inp.onchange=e=>{
const file=e.target.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=ev=>{
try{
const bundle=JSON.parse(ev.target.result);
if(bundle.prog){saveProg(bundle.prog);setProg({...bundle.prog});}
if(bundle.favs){setFavs(bundle.favs);try{localStorage.setItem("ld_favs",JSON.stringify(bundle.favs));}catch(e){}}
if(bundle.langs){updateLangs(bundle.langs);}
alert("✅ Progress imported successfully!");
}catch(err){alert("❌ Invalid file. Please use a LinguaDaily export file.");}
};
reader.readAsText(file);
};
inp.click();
}} style={{flex:1,padding:"9px",borderRadius:14,border:`2px solid ${dmBorder}`,
background:dmCard,color:dmText,fontWeight:700,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
📥 Import Progress
</button>
</div>

{/* ── Search Box ── */}
{showSearch&&(
<div style={{marginBottom:16}}>
<input value={search} onChange={e=>setSearch(e.target.value)}
placeholder="Search any word e.g. Hello, Water, Red..."
style={{width:"100%",padding:"12px 16px",borderRadius:14,border:`2px solid ${DM?"#6060aa":"#1a1a2e"}`,fontSize:14,outline:"none",
fontFamily:"inherit",color:dmText,background:dmCard,fontWeight:600}}/>
{search.trim()&&(()=>{
const q=search.trim().toLowerCase();
const results=[];
CATS.forEach(ct=>{
(W["es"]?.[ct.id]||[]).forEach((w,wi)=>{
if(w[0].toLowerCase().includes(q)){
results.push({cat:ct.id,catLabel:ct.label,catIcon:ct.icon,en:w[0],wi});
}
});
});
return results.length===0
?<div style={{textAlign:"center",color:dmSub,fontSize:13,padding:12}}>No results for "{search}"</div>
:(<div style={{display:"flex",flexDirection:"column",gap:5,marginTop:8,maxHeight:220,overflowY:"auto"}}>
{results.map((r,ri)=>(
<div key={ri} onClick={()=>{
setCat(r.cat);setIdx(r.wi);setShowSearch(false);setSearch("");
if(selLangs.length>0)setScreen("learn");
}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
background:dmCard,borderRadius:12,cursor:"pointer",boxShadow:DM?"0 2px 6px rgba(0,0,0,0.3)":"0 2px 6px rgba(0,0,0,0.06)",
border:"1.5px solid #f0f0f0"}}>
<span style={{fontSize:20}}>{r.catIcon}</span>
<div style={{flex:1}}>
<div style={{fontWeight:700,fontSize:14,color:dmText}}>{r.en}</div>
<div style={{fontSize:11,color:dmSub}}>{r.catLabel} • Word {r.wi+1}</div>
</div>
<span style={{fontSize:12,color:dmSub}}>→</span>
</div>
))}
</div>);
})()}
</div>
)}

<div style={{fontSize:11,fontWeight:700,color:dmSub,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Filter by Region</div>
<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:18}}>
{REGIONS.map(r=>(
<button key={r} onClick={()=>setRegion(r)} style={{padding:"6px 12px",borderRadius:20,border:"none",cursor:"pointer",
background:region===r?"#1a1a2e":(DM?"#2a2a4e":"#f0f0f0"),color:region===r?"#fff":(DM?"#ffffff":"#555"),fontWeight:700,fontSize:11}}>{r}</button>
))}
</div>
<div style={{fontSize:11,fontWeight:700,color:dmSub,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Pick Languages ({selLangs.length} selected)</div>
<div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:20}}>
{filtered.map(l=>{
const sel=selLangs.includes(l.code);
return(
<div key={l.code} onClick={()=>toggle(l.code)} style={{display:"flex",alignItems:"center",gap:11,
padding:KM?"14px 16px":"10px 14px",
borderRadius:KM?20:14,
background:sel?l.light:dmCard,
border:sel?`${KM?3:2}px solid ${l.color}`:`${KM?3:2}px solid ${dmBorder}`,
cursor:"pointer",transition:"all .2s",
boxShadow:KM&&sel?`0 4px 16px ${l.color}44`:"none"}}>
<span style={{fontSize:KM?28:20}}>{l.flag}</span>
<div style={{flex:1}}>
<div style={{fontWeight:800,fontSize:KM?16:13,color:sel?"#1a1a2e":dmText,fontFamily:KM?"'Nunito',sans-serif":"inherit"}}>{l.name}</div>
<div style={{fontSize:KM?13:11,color:dmSub}}>{l.region}</div>
</div>
<div style={{width:KM?32:22,height:KM?32:22,borderRadius:"50%",background:sel?l.color:"#eee",
display:"flex",alignItems:"center",justifyContent:"center",fontSize:KM?16:12,color:"#fff",fontWeight:800,transition:"background .2s"}}>
{sel?"✓":""}
</div>
</div>
);
})}
</div>
{selLangs.length>0&&(
<>
<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
{activeLangs.map(l=>(
<div key={l.code} style={{padding:"5px 12px",borderRadius:20,background:l.color,color:"#fff",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:5}}>
<span>{l.flag}</span>{l.name}
</div>
))}
</div>
<button onClick={()=>{setIdx(0);setScreen("learn");}} style={{width:"100%",
padding:KM?20:16,borderRadius:KM?24:18,border:"none",
background:KM?"linear-gradient(135deg,#FF6B9D,#C44DFF)":"linear-gradient(135deg,#1a1a2e,#3a3a6e)",
color:"#fff",fontWeight:900,fontSize:KM?20:16,cursor:"pointer",
fontFamily:KM?"'Nunito',sans-serif":"inherit",
boxShadow:KM?"0 8px 28px rgba(196,77,255,0.5)":"0 8px 28px rgba(26,26,46,0.4)"}}>
{KM?"🌈 Let's Learn! 🚀":"🚀 Start Learning "+selLangs.length+" Language"+(selLangs.length>1?"s":"")+" Together"}
</button>
</>
)}
</div>
</Shell>
);

/* ── QUIZ ── */
if(screen==="quiz"&&(!cards||cards.length===0)) return(
<Shell>
<div style={{background:"linear-gradient(135deg,#E63946,#C02030)",padding:"44px 18px 14px"}}>
<div style={{display:"flex",alignItems:"center",gap:10}}>
<button onClick={()=>setScreen("learn")} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:10,padding:"6px 12px",color:"#fff",cursor:"pointer",fontSize:16}}>←</button>
<div style={{fontWeight:800,color:"#fff",fontSize:17}}>⚠ Quiz Unavailable</div>
</div>
</div>
<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,textAlign:"center"}}>
<div style={{fontSize:56,marginBottom:16}}>🚧</div>
<div style={{fontSize:18,fontWeight:800,color:DM?"#ffffff":"#1a1a2e",marginBottom:8}}>No quiz data available</div>
<div style={{fontSize:14,color:DM?"#c8d0f0":"#888",marginBottom:24}}>Please select a language with available content first.</div>
<button onClick={()=>setScreen("home")} style={{padding:"12px 28px",borderRadius:16,border:"none",background:"linear-gradient(135deg,#E63946,#C02030)",color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer"}}>
← Back to Home
</button>
</div>
</Shell>
);

if(screen==="quiz") return(
<Shell>
<div style={{background:KM?"linear-gradient(135deg,#FF6B9D,#FF9A3C)":"linear-gradient(135deg,#E63946,#C02030)",padding:"44px 18px 14px"}}>
<div style={{display:"flex",alignItems:"center",gap:10}}>
<button onClick={()=>setScreen("learn")} style={{background:"rgba(255,255,255,0.2)",border:"none",
borderRadius:KM?14:10,padding:"6px 12px",color:"#fff",cursor:"pointer",fontSize:KM?20:16}}>←</button>
<div style={{fontWeight:900,color:"#fff",fontSize:KM?22:19,flex:1,fontFamily:KM?"'Nunito',sans-serif":"inherit"}}>
{KM?"🌟 Quiz Time! 🌟":"🎯 "+CATS.find(c=>c.id===cat)?.label+" Quiz"}
</div>
<div style={{fontSize:22}}>{activeLangs.map(l=>l.flag).join(" ")}</div>
</div>
</div>
<Quiz cards={cards} langObjs={activeLangs} catLabel={cat} catId={cat} onQuizDone={onQuizDone} onClose={()=>setScreen("learn")} kidsMode={KM}/>
</Shell>
);

/* ── LEARN ── */
/* ── Guard: no data for language ── */
if(screen==="learn"&&activeLangs.length>0&&!card) return(
<Shell>
<div style={{background:"linear-gradient(135deg,#1a1a2e,#16213e)",padding:"44px 18px 14px"}}>
<div style={{display:"flex",alignItems:"center",gap:10}}>
<button onClick={()=>setScreen("home")} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:10,padding:"6px 12px",color:"#fff",cursor:"pointer",fontSize:16}}>←</button>
<div style={{fontWeight:800,color:"#fff",fontSize:16}}>⚠ Data Unavailable</div>
</div>
</div>
<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,textAlign:"center"}}>
<div style={{fontSize:56,marginBottom:16}}>🚧</div>
<div style={{fontSize:20,fontWeight:800,color:"#1a1a2e",marginBottom:8}}>No data available</div>
<div style={{fontSize:14,color:DM?"#c8d0f0":"#888",marginBottom:24,lineHeight:1.6}}>
The selected language combination has no content for this category yet.
Please try a different language or category.
</div>
<button onClick={()=>setScreen("home")} style={{padding:"12px 28px",borderRadius:16,border:"none",background:"linear-gradient(135deg,#1a1a2e,#3a3a6e)",color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer"}}>
← Back to Home
</button>
</div>
</Shell>
);

if(screen==="learn"&&activeLangs.length>0&&card) return(
<Shell>
{/* Header */}
<div style={{background:KM?"linear-gradient(135deg,#7C3AED,#C44DFF)":"linear-gradient(135deg,#1a1a2e,#16213e)",padding:"44px 16px 12px"}}>
<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
<button onClick={()=>setScreen("home")} style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:10,padding:"6px 12px",color:"#fff",cursor:"pointer",fontSize:16}}>←</button>
<div style={{fontWeight:800,color:"#fff",fontSize:16,flex:1}}>{activeLangs.map(l=>l.flag).join(" ")} Multi-Learn</div>
<div style={{display:"flex",alignItems:"center",gap:6}}>
{/* Favourite toggle */}
<button onClick={()=>toggleFav(cat+"|"+idx)}
style={{background:"transparent",border:"none",cursor:"pointer",fontSize:20,padding:"2px 4px",
filter:favs.includes(cat+"|"+idx)?"none":"grayscale(1) opacity(0.5)"}}>
⭐
</button>
{/* Flashcard toggle */}
<button onClick={()=>{setFlashMode(m=>!m);setFlashFlipped(false);}}
style={{background:flashMode?"#FFD700":"rgba(255,255,255,0.15)",border:"none",cursor:"pointer",
borderRadius:8,padding:"4px 8px",fontSize:11,fontWeight:700,color:flashMode?"#1a1a2e":"#fff"}}>
{flashMode?"📖 Learn":"🃏 Flash"}
</button>
<div style={{fontSize:14,color:"#fff",fontWeight:800,background:"rgba(255,255,255,0.15)",padding:"3px 10px",borderRadius:12}}>{idx+1}/{total}</div>
</div>
</div>
{/* Category tabs */}
<div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:2}} className="ns">
{CATS.map(c=>(
<button key={c.id} onClick={()=>{setCat(c.id);setIdx(0);}} style={{padding:"5px 10px",borderRadius:14,border:"none",cursor:"pointer",
background:cat===c.id?"#fff":"rgba(255,255,255,0.14)",color:cat===c.id?"#1a1a2e":"#fff",
fontWeight:700,fontSize:11,whiteSpace:"nowrap"}}>
{completedCats.includes(c.id)?"✅ ":""}{c.icon} {c.label}
</button>
))}
</div>
</div>

{/* Progress bar */}
<div style={{height:3,background:DM?"#2a2a4e":"#eee"}}>
<div style={{height:"100%",width:`${((idx+1)/total)*100}%`,background:"#FF9933",transition:"width .3s"}}/>
</div>

<div style={{flex:1,overflowY:"auto",padding:"12px 12px 20px",background:dmBg,transition:"background .3s"}}>
{/* ── FLASHCARD MODE ── */}
{flashMode?(
<div onClick={()=>{setFlashFlipped(f=>!f);if(!flashFlipped)speakWord(activeLangs[0]&&W[activeLangs[0].code]?.[cat]?.[idx]?.[1]||card[0],activeLangs[0]?.voice||"en-US");}}
style={{background:"linear-gradient(135deg,#1a1a2e,#2d2d5e)",borderRadius:24,padding:"30px 20px",
textAlign:"center",marginBottom:14,cursor:"pointer",minHeight:180,
display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
boxShadow:"0 12px 36px rgba(26,26,46,0.4)",border:"1px solid rgba(255,255,255,0.15)",
transition:"all .3s"}}>
{!flashFlipped?(
<>
<div style={{fontSize:11,color:"rgba(255,255,255,0.6)",letterSpacing:3,textTransform:"uppercase",marginBottom:8}}>Tap to reveal translation</div>
<div style={{fontSize:40,fontWeight:900,color:"#fff",textShadow:"0 2px 12px rgba(0,0,0,0.5)"}}>{card[0]}</div>
<div style={{fontSize:13,color:"rgba(255,255,255,0.5)",marginTop:12}}>🃏 Tap the card</div>
</>
):(
<>
<div style={{fontSize:11,color:"#FFD700",letterSpacing:3,textTransform:"uppercase",marginBottom:6}}>Translations</div>
{activeLangs.map(l=>{
const c=getTr(l.code);
return c&&(
<div key={l.code} style={{marginBottom:6}}>
<span style={{fontSize:13,color:"rgba(255,255,255,0.6)"}}>{l.flag} </span>
<span style={{fontSize:26,fontWeight:900,color:l.color}}>{c[1]}</span>
<span style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginLeft:8}}>{c[2]}</span>
</div>
);
})}
<div style={{fontSize:12,color:"rgba(255,255,255,0.5)",marginTop:8}}>🔊 Tap to hear all</div>
</>
)}
</div>
):(
<>
{/* English hero — Normal learn mode — not flashcard */}
<div style={{background:KM?"linear-gradient(135deg,#FF6B9D,#FF9A3C)":"linear-gradient(135deg,#1a1a2e,#2d2d5e)",
borderRadius:KM?28:20,padding:KM?"22px 20px 16px":"18px 18px 14px",textAlign:"center",marginBottom:10,
boxShadow:KM?"0 10px 32px rgba(255,107,157,0.4)":"0 8px 28px rgba(26,26,46,0.25)"}}>
{KM&&<div style={{fontSize:52,marginBottom:4}}>{EMOJI_MAP[card[0]]||"📚"}</div>}
<div style={{fontSize:KM?16:13,color:"rgba(255,255,255,0.95)",letterSpacing:KM?1:3,
textTransform:"uppercase",marginBottom:6,fontWeight:800,
fontFamily:KM?"'Nunito',sans-serif":"inherit"}}>
{KM?"🇬🇧 English Word":"English"}
</div>
<div style={{fontSize:KM?44:36,fontWeight:900,color:"#fff",marginBottom:8,cursor:"pointer",
textShadow:"0 2px 12px rgba(0,0,0,0.4)",fontFamily:KM?"'Nunito',sans-serif":"inherit"}}
onClick={()=>speakWord(card[0],"en-US")}>{card[0]}</div>
<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
<SpeakBtn text={card[0]} voiceLang="en-US" size={26}/>
<button onClick={doSpeakAll} style={{padding:"5px 12px",borderRadius:18,border:"none",
background:speakAll?"rgba(255,153,51,0.9)":"rgba(255,255,255,0.22)",color:"#fff",fontSize:13,fontWeight:800,cursor:"pointer"}}>
{speakAll?"🔊 Playing…":"🔊 Speak All"}
</button>
</div>
</div>

{/* Language cards — ALL 3 examples shown */}
<div style={{display:"flex",flexDirection:"column",gap:10}}>
{activeLangs.map(l=>{
const c=getTr(l.code);
if(!c)return null;
return(
<div key={l.code} style={{background:dmCard,borderRadius:16,
borderLeft:`5px solid ${l.color}`,border:`1.5px solid ${l.color}22`,borderLeftWidth:5,borderLeftColor:l.color,
padding:"12px 12px 10px",boxShadow:"0 2px 10px rgba(0,0,0,0.06)"}}>

{/* Lang header */}
<div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}>
<span style={{fontSize:KM?24:17}}>{l.flag}</span>
<span style={{fontWeight:800,fontSize:KM?18:14,color:l.color,fontFamily:KM?"'Nunito',sans-serif":"inherit"}}>{l.name}</span>
<span style={{marginLeft:"auto",fontSize:KM?12:10,color:l.color,background:l.light,padding:"2px 8px",borderRadius:8,fontWeight:700}}>{l.region}</span>
</div>

{/* Translation + speak */}
<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,
background:l.light,borderRadius:12,padding:"10px 12px",cursor:"pointer"}}
onClick={()=>speakWord(c[1],l.voice)}>
<div style={{flex:1}}>
<div style={{fontSize:KM?30:22,fontWeight:900,color:"#1a1a2e",lineHeight:1.2,
fontFamily:KM?"'Nunito',sans-serif":"inherit"}}>{c[1]}</div>
<div style={{fontSize:KM?14:11,color:"#888",marginTop:3,fontWeight:KM?700:400}}>🔊 {c[2]}</div>
</div>
<SpeakBtn text={c[1]} voiceLang={l.voice} size={34}/>
</div>

{/* ALL 3 EXAMPLES — highlight learning word + English translation + sentence speak */}
<div style={{display:"flex",flexDirection:"column",gap:8}}>
{[
[c[3],c[6]],[c[4],c[7]],[c[5],c[8]]
].map(([ex,enEx],ei)=>ex&&(
<div key={ei} style={{padding:"13px 14px",background:DM?"rgba(255,255,255,0.05)":"rgba(0,0,0,0.03)",borderRadius:14,
border:`1px solid ${DM?l.color+"55":l.color+"28"}`}}>
{/* Header row: label + full sentence speak button */}
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
<div style={{fontSize:13,color:l.color,fontWeight:800,textTransform:"uppercase",letterSpacing:1}}>
Example {ei+1}
</div>
<SentenceBtn text={ex} voiceLang={l.voice} color={l.color}/>
</div>
{/* Target language sentence — learning word highlighted, each word tappable */}
<TappableSentence text={ex} voiceLang={l.voice} color={l.color} learnWord={c[1]}/>
{/* English translation below */}
{enEx&&(
<div style={{marginTop:5,paddingTop:5,borderTop:`1px dashed ${DM?l.color+"66":l.color+"33"}`,
display:"flex",alignItems:"center",gap:5}}>
<span style={{fontSize:14,fontWeight:800,color:DM?"#aabbff":l.color,flexShrink:0}}>🇬🇧</span>
<span style={{fontSize:12,color:DM?"#dde3ff":"#555",fontStyle:"italic",fontWeight:600,fontSize:15,lineHeight:1.6}}>{enEx}</span>
</div>
)}
</div>
))}
</div>
</div>
);
})}
</div>

</>
)}
{/* Navigation */}
<div style={{display:"flex",gap:8,marginTop:14}}>
<button onClick={prev} style={{flex:1,padding:KM?"16px":"12px",borderRadius:KM?20:14,
border:KM?"3px solid #C44DFF":"2px solid #eee",
background:KM?"#F0E6FF":"#fff",fontSize:KM?24:18,cursor:"pointer"}}>
{KM?"⬅️":"←"}
</button>
<button onClick={next} style={{flex:2,padding:KM?"16px":"12px",borderRadius:KM?20:14,border:"none",
background:"linear-gradient(135deg,#1a1a2e,#3a3a6e)",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer",
boxShadow:"0 6px 18px rgba(26,26,46,0.3)"}}>Next Word →</button>
</div>

{/* Quiz button */}
<button onClick={()=>{setIdx(0);setScreen("quiz");}} style={{width:"100%",padding:"13px",borderRadius:16,border:"none",marginTop:10,
background:"linear-gradient(135deg,#E63946,#C02030)",color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer",
boxShadow:"0 6px 18px rgba(230,57,70,0.4)",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
🎯 Take Quiz on {CATS.find(c=>c.id===cat)?.label}!
</button>
<div style={{textAlign:"center",fontSize:11,color:dmSub,marginTop:8,fontWeight:700}}>
👆 Tap any word in examples to hear it pronounced!
</div>
</div>
</Shell>
);

/* ── FAVOURITES SCREEN ── */
if(screen==="favourites") return(
<Shell>
<div style={{background:"linear-gradient(135deg,#E63946,#C02030)",padding:"44px 18px 14px"}}>
<div style={{display:"flex",alignItems:"center",gap:10}}>
<button onClick={()=>setScreen("home")} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:10,padding:"6px 12px",color:"#fff",cursor:"pointer",fontSize:16}}>←</button>
<div style={{fontWeight:900,color:"#fff",fontSize:19,flex:1}}>⭐ Favourites</div>
<div style={{fontSize:13,color:"rgba(255,255,255,0.8)",fontWeight:700}}>{favs.length} saved</div>
</div>
</div>
<div style={{flex:1,overflowY:"auto",padding:"14px 14px 24px",background:dmBg}}>
{favs.length===0?(
<div style={{textAlign:"center",padding:"48px 24px",color:DM?"#a8b2d8":dmSub}}>
<div style={{fontSize:48,marginBottom:12}}>⭐</div>
<div style={{fontSize:16,fontWeight:700,marginBottom:8}}>No favourites yet!</div>
<div style={{fontSize:13}}>While learning, tap ⭐ on any word to save it here.</div>
</div>
):(
<div style={{display:"flex",flexDirection:"column",gap:10}}>
{favs.map((favKey,fi)=>{
const [favCat,favIdxStr]=favKey.split("|");
const favIdx=parseInt(favIdxStr);
const catInfo=CATS.find(c=>c.id===favCat);
const enWord=(W["es"]?.[favCat]||[])[favIdx]?.[0]||"?";
return(
<div key={fi} style={{background:dmCard,borderRadius:14,padding:"12px 14px",
boxShadow:"0 2px 8px rgba(0,0,0,0.07)",border:"1.5px solid #f5f5f5"}}>
<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
<span style={{fontSize:20}}>{catInfo?.icon}</span>
<div style={{flex:1}}>
<div style={{fontWeight:800,fontSize:16,color:dmText}}>{enWord}</div>
<div style={{fontSize:11,color:dmSub}}>{catInfo?.label}</div>
</div>
<button onClick={()=>toggleFav(favKey)}
style={{background:"none",border:"none",cursor:"pointer",fontSize:20,padding:"2px 6px"}}>⭐</button>
<button onClick={()=>{
setCat(favCat);setIdx(favIdx);
if(selLangs.length>0){setScreen("learn");}else{setScreen("home");}
}} style={{background:"#1a1a2e",border:"none",borderRadius:10,padding:"6px 12px",
color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>
Learn →
</button>
</div>
{/* Show translations for selected langs */}
<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
{activeLangs.slice(0,4).map(l=>{
const tr=(W[l.code]?.[favCat]||[])[favIdx]?.[1]||"";
return tr&&(
<div key={l.code} onClick={()=>speakWord(tr,l.voice)}
style={{background:l.light,borderRadius:10,padding:"4px 10px",cursor:"pointer",
display:"flex",alignItems:"center",gap:4}}>
<span style={{fontSize:12}}>{l.flag}</span>
<span style={{fontSize:13,fontWeight:700,color:l.color}}>{tr}</span>
<span style={{fontSize:10}}>🔊</span>
</div>
);
})}
</div>
</div>
);
})}
{favs.length>0&&(
<button onClick={()=>{setFavs([]);try{localStorage.removeItem("ld_favs");}catch(e){}}}
style={{padding:"10px",borderRadius:14,border:"2px solid #ffcccc",background:dmCard,
color:"#E63946",fontWeight:700,fontSize:13,cursor:"pointer",marginTop:8}}>
🗑 Clear All Favourites
</button>
)}
</div>
)}
</div>
</Shell>
);

return null;
}

const style=document.createElement("style");
style.textContent=`@keyframes cfall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}`;
document.head.appendChild(style);

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
